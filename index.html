// ===== APP STATE =====
let state = {
  currentSection: 0,
  answered: {},
  streak: 0,
  maxStreak: 0,
  mode: "quiz",
  diffFilter: { gk: true, lk: true, abi: true },
  weakQuestions: [],
  dailyGoal: 20,
  dailyAnswered: 0,
  dailyDate: new Date().toDateString(),
  feynmanTexts: {},
  pomodoroVisible: false,
  lastMilestone: 0
};

// ===== POMODORO STATE =====
let pomodoroState = {
  running: false,
  breakMode: false,
  seconds: 25 * 60,
  interval: null
};

// ===== SPEED ROUND STATE =====
let speedState = {
  active: false,
  questions: [],
  currentIndex: 0,
  score: 0,
  timeLeft: 60,
  interval: null,
  finished: false
};

// Load state from localStorage
function loadState() {
  try {
    const saved = localStorage.getItem('bio-meister-state-v2');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.answered = parsed.answered || {};
      state.streak = parsed.streak || 0;
      state.maxStreak = parsed.maxStreak || 0;
      state.diffFilter = parsed.diffFilter || { gk: true, lk: true, abi: true };
      state.weakQuestions = parsed.weakQuestions || [];
      state.feynmanTexts = parsed.feynmanTexts || {};
      state.lastMilestone = parsed.lastMilestone || 0;
      // Daily goal reset
      if (parsed.dailyDate === new Date().toDateString()) {
        state.dailyAnswered = parsed.dailyAnswered || 0;
      } else {
        state.dailyAnswered = 0;
      }
      state.dailyDate = new Date().toDateString();
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('bio-meister-state-v2', JSON.stringify({
      answered: state.answered,
      streak: state.streak,
      maxStreak: state.maxStreak,
      diffFilter: state.diffFilter,
      weakQuestions: state.weakQuestions,
      dailyAnswered: state.dailyAnswered,
      dailyDate: state.dailyDate,
      feynmanTexts: state.feynmanTexts,
      lastMilestone: state.lastMilestone
    }));
  } catch(e) {}
}

// ===== HELPER: GET FILTERED QUESTIONS =====
function getFilteredQuestions(qs) {
  return qs.filter(q => state.diffFilter[q.level]);
}

function getFilteredIndexMap(sectionId) {
  const s = sections.find(sec => sec.id === sectionId);
  const map = [];
  s.questions.forEach((q, origIdx) => {
    if (state.diffFilter[q.level]) {
      map.push(origIdx);
    }
  });
  return map;
}

// ===== POMODORO TIMER =====
function togglePomodoro() {
  const details = document.getElementById('pomodoroDetails');
  state.pomodoroVisible = !state.pomodoroVisible;
  details.style.display = state.pomodoroVisible ? 'flex' : 'none';
}

function startPomodoro(e) {
  e.stopPropagation();
  if (pomodoroState.running) {
    clearInterval(pomodoroState.interval);
    pomodoroState.running = false;
    document.getElementById('pomStartBtn').textContent = 'Start';
    return;
  }
  pomodoroState.running = true;
  document.getElementById('pomStartBtn').textContent = 'Pause';
  document.getElementById('pomStartBtn').classList.add('active');
  pomodoroState.interval = setInterval(() => {
    pomodoroState.seconds--;
    if (pomodoroState.seconds <= 0) {
      clearInterval(pomodoroState.interval);
      pomodoroState.running = false;
      if (pomodoroState.breakMode) {
        pomodoroState.breakMode = false;
        pomodoroState.seconds = 25 * 60;
        document.getElementById('pomodoroStatus').textContent = 'Fokuszeit';
      } else {
        pomodoroState.breakMode = true;
        pomodoroState.seconds = 5 * 60;
        document.getElementById('pomodoroStatus').textContent = 'Pause!';
      }
      document.getElementById('pomStartBtn').textContent = 'Start';
      document.getElementById('pomStartBtn').classList.remove('active');
    }
    updatePomodoroDisplay();
  }, 1000);
}

function resetPomodoro(e) {
  e.stopPropagation();
  clearInterval(pomodoroState.interval);
  pomodoroState.running = false;
  pomodoroState.breakMode = false;
  pomodoroState.seconds = 25 * 60;
  document.getElementById('pomStartBtn').textContent = 'Start';
  document.getElementById('pomStartBtn').classList.remove('active');
  document.getElementById('pomodoroStatus').textContent = 'Fokuszeit';
  updatePomodoroDisplay();
}

function updatePomodoroDisplay() {
  const min = Math.floor(pomodoroState.seconds / 60);
  const sec = pomodoroState.seconds % 60;
  const timeEl = document.getElementById('pomodoroTime');
  timeEl.textContent = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  timeEl.className = 'pomodoro-time' + (pomodoroState.breakMode ? ' break-mode' : '');
}

// ===== DAILY GOAL =====
function updateDailyGoal() {
  const pct = Math.min(100, Math.round(state.dailyAnswered / state.dailyGoal * 100));
  const fill = document.getElementById('dailyGoalFill');
  const count = document.getElementById('dailyGoalCount');
  const text = document.getElementById('dailyGoalText');
  if (fill) fill.style.width = pct + '%';
  if (count) count.textContent = `${state.dailyAnswered}/${state.dailyGoal}`;
  if (text) {
    if (state.dailyAnswered >= state.dailyGoal) {
      text.innerHTML = '<strong>Tagesziel erreicht!</strong> Weiter so!';
    } else {
      text.innerHTML = `<strong>Tagesziel:</strong> Beantworte heute ${state.dailyGoal} Fragen!`;
    }
  }
}

// ===== MILESTONE CELEBRATIONS =====
function checkMilestones() {
  const totalQ = sections.reduce((sum, s) => sum + s.questions.length, 0);
  const answeredCount = Object.keys(state.answered).length;
  const pct = Math.round(answeredCount / totalQ * 100);
  const milestones = [25, 50, 75, 100];
  for (const m of milestones) {
    if (pct >= m && state.lastMilestone < m) {
      state.lastMilestone = m;
      saveState();
      showMilestone(m);
      launchConfetti();
      break;
    }
  }
}

function showMilestone(pct) {
  const emojis = { 25: '\uD83C\uDF1F', 50: '\uD83D\uDD25', 75: '\uD83D\uDE80', 100: '\uD83C\uDFC6' };
  const msgs = { 25: '25% geschafft!', 50: 'Halbzeit!', 75: 'Fast da!', 100: 'ALLES geschafft!' };
  const subs = { 25: 'Guter Start!', 50: 'Die Haelfte ist geschafft!', 75: 'Nur noch ein Viertel!', 100: 'Du bist ein Bio-Meister!' };
  const overlay = document.createElement('div');
  overlay.className = 'milestone-overlay';
  overlay.innerHTML = `<div class="milestone-content">
    <span class="milestone-emoji">${emojis[pct]}</span>
    <div class="milestone-text">${msgs[pct]}</div>
    <div class="milestone-sub">${subs[pct]}</div>
  </div>`;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
  setTimeout(() => { if (overlay.parentNode) overlay.remove(); }, 3000);
}

// ===== RENDER NAVIGATION =====
function renderNav() {
  const tabs = document.getElementById('navTabs');
  let html = sections.map((s, i) => {
    const filteredMap = getFilteredIndexMap(s.id);
    const sectionQs = filteredMap.length;
    const answered = filteredMap.filter(qi => state.answered[`${s.id}_${qi}`]).length;
    const isActive = !mixedMode && !speedState.active && i === state.currentSection;
    return `<button class="nav-tab ${isActive ? 'active' : ''}" onclick="switchSection(${i})">
      ${s.emoji} ${s.title}
      <span class="tab-progress">${answered}/${sectionQs}</span>
    </button>`;
  }).join('');

  const isMixed = mixedMode && state.currentSection === sections.length;
  html += `<button class="nav-tab ${isMixed ? 'active' : ''}" onclick="state.currentSection=${sections.length};mixedMode=true;speedState.active=false;renderSection();" style="border-color:${isMixed ? 'var(--purple)' : ''};color:${isMixed ? 'var(--purple)' : ''};">
    \uD83C\uDFB2 Gemischter Test
  </button>`;

  // Weak questions tab
  if (state.weakQuestions.length > 0) {
    const isWeak = state.currentSection === sections.length + 1;
    html += `<button class="nav-tab ${isWeak ? 'active' : ''}" onclick="showWeakQuestions()" style="border-color:${isWeak ? 'var(--orange)' : 'rgba(249,115,22,0.2)'};color:${isWeak ? 'var(--orange)' : 'var(--orange)'};">
      &#128260; Schwache (${state.weakQuestions.length})
    </button>`;
  }

  html += `<button class="nav-tab" onclick="resetAll()" style="margin-left:auto;color:var(--red);border-color:rgba(239,68,68,0.2);">
    \u21BA Reset
  </button>`;

  tabs.innerHTML = html;
}

function switchSection(idx) {
  state.currentSection = idx;
  mixedMode = false;
  speedState.active = false;
  if (speedState.interval) { clearInterval(speedState.interval); speedState.interval = null; }
  renderNav();
  renderSection();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== RENDER STATS =====
function updateStats() {
  const totalQ = sections.reduce((sum, s) => sum + s.questions.length, 0);
  const answeredCount = Object.keys(state.answered).length;
  const correctCount = Object.values(state.answered).filter(a => a.correct).length;
  const wrongCount = answeredCount - correctCount;

  document.getElementById('statTotal').textContent = totalQ;
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  document.getElementById('statStreak').textContent = state.streak;

  const pct = totalQ > 0 ? (answeredCount / totalQ * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${answeredCount} / ${totalQ} Fragen beantwortet (${Math.round(pct)}%)`;

  updateDailyGoal();
  checkMilestones();
}

// ===== SHOW WEAK QUESTIONS =====
function showWeakQuestions() {
  state.currentSection = sections.length + 1;
  mixedMode = false;
  speedState.active = false;
  renderNav();
  const container = document.getElementById('sectionsContainer');
  let html = `<div class="section active">
    <div class="section-header"><h2>&#128260; Schwache Fragen</h2>
    <p class="section-desc">Diese Fragen hast du falsch beantwortet. Wiederhole sie, um dein Wissen zu festigen!</p></div>`;

  if (state.weakQuestions.length === 0) {
    html += `<div class="mixed-intro"><h3>Keine schwachen Fragen!</h3><p>Du hast alles richtig beantwortet. Weiter so!</p></div>`;
  } else {
    html += `<div class="btn-group" style="margin-bottom:16px;"><button class="btn btn-primary" onclick="clearWeakQuestions()">Alle entfernen</button></div>`;
    html += `<div class="weak-list">`;
    state.weakQuestions.forEach((wq, i) => {
      const section = sections.find(s => s.id === wq.sectionId);
      const q = section ? section.questions[wq.qi] : null;
      if (q) {
        html += `<div class="weak-item">
          <span class="weak-section-tag">${section.emoji} ${section.title}</span>
          <span class="weak-q">${q.q}</span>
          <button class="btn btn-hint" onclick="jumpToQuestion('${wq.sectionId}', ${wq.qi})" style="white-space:nowrap;">Gehe zu Frage</button>
        </div>`;
      }
    });
    html += `</div>`;
  }

  html += '</div>';
  container.innerHTML = html;
  updateStats();
}

function clearWeakQuestions() {
  state.weakQuestions = [];
  saveState();
  showWeakQuestions();
  renderNav();
}

function jumpToQuestion(sectionId, qi) {
  const idx = sections.findIndex(s => s.id === sectionId);
  if (idx >= 0) {
    // Reset this specific answer so they can retry
    delete state.answered[`${sectionId}_${qi}`];
    saveState();
    switchSection(idx);
    setTimeout(() => {
      const card = document.getElementById(`qcard_${sectionId}_${qi}`);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
}

// ===== RENDER SECTION =====
function renderSection() {
  if (mixedMode && state.currentSection === sections.length) {
    renderMixedQuiz();
    updateStats();
    return;
  }
  if (state.currentSection >= sections.length) return;
  mixedMode = false;

  const container = document.getElementById('sectionsContainer');
  const s = sections[state.currentSection];
  const filteredMap = getFilteredIndexMap(s.id);

  let html = `<div class="section active">
    <div class="section-header">
      <h2><span class="section-emoji">${s.emoji}</span>${s.title}</h2>
      <p class="section-desc">${filteredMap.length} Fragen — Beantworte alle, um dieses Kapitel abzuschliessen!</p>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn ${state.mode === 'quiz' && !speedState.active ? 'active' : ''}" onclick="setMode('quiz')">Quiz-Modus</button>
      <button class="mode-btn ${state.mode === 'flashcard' && !speedState.active ? 'active' : ''}" onclick="setMode('flashcard')">Lernkarten</button>
      <button class="mode-btn ${speedState.active ? 'speed-active' : ''}" onclick="startSpeedRound()">&#9889; Speed-Runde</button>
    </div>
    <div class="difficulty-filter">
      <span class="filter-label">Schwierigkeit:</span>
      <button class="diff-btn ${state.diffFilter.gk ? 'active-gk' : ''}" onclick="toggleDiff('gk')">GK</button>
      <button class="diff-btn ${state.diffFilter.lk ? 'active-lk' : ''}" onclick="toggleDiff('lk')">LK</button>
      <button class="diff-btn ${state.diffFilter.abi ? 'active-abi' : ''}" onclick="toggleDiff('abi')">Abi</button>
    </div>`;

  if (speedState.active) {
    html += renderSpeedRound(s);
  } else if (state.mode === 'quiz') {
    // Add diagram if available
    if (diagrams[s.id]) {
      html += diagrams[s.id];
    }
    filteredMap.forEach(qi => {
      html += renderQuestion(s.id, qi, s.questions[qi]);
    });
    // Section summary
    const sAnswered = filteredMap.filter(qi => state.answered[`${s.id}_${qi}`]).length;
    const sCorrect = filteredMap.filter(qi => state.answered[`${s.id}_${qi}`]?.correct).length;
    if (sAnswered === filteredMap.length && filteredMap.length > 0) {
      const pct = Math.round(sCorrect / filteredMap.length * 100);
      let grade, gradeClass;
      if (pct >= 90) { grade = 'Sehr gut!'; gradeClass = 'grade-excellent'; }
      else if (pct >= 75) { grade = 'Gut!'; gradeClass = 'grade-good'; }
      else if (pct >= 50) { grade = 'Befriedigend'; gradeClass = 'grade-ok'; }
      else { grade = 'Nochmal ueben!'; gradeClass = 'grade-bad'; }
      html += `<div class="summary-card">
        <h3>Kapitel abgeschlossen!</h3>
        <div class="summary-grade ${gradeClass}">${pct}%</div>
        <p>${grade} -- ${sCorrect} von ${filteredMap.length} richtig</p>
        <div class="btn-group" style="justify-content:center;margin-top:16px;">
          <button class="btn btn-primary" onclick="resetSection('${s.id}')">Kapitel wiederholen</button>
          ${state.currentSection < sections.length - 1 ? `<button class="btn btn-secondary" onclick="switchSection(${state.currentSection + 1})">Naechstes Kapitel &rarr;</button>` : ''}
        </div>
      </div>`;
      // Feynman technique card
      html += renderFeynmanCard(s);
    }
  } else {
    html += renderFlashcards(s);
  }

  html += '</div>';
  container.innerHTML = html;
  updateStats();
  renderNav();
}

// ===== DIFFICULTY TOGGLE =====
function toggleDiff(level) {
  state.diffFilter[level] = !state.diffFilter[level];
  // Ensure at least one is active
  if (!state.diffFilter.gk && !state.diffFilter.lk && !state.diffFilter.abi) {
    state.diffFilter[level] = true;
  }
  saveState();
  renderSection();
}

// ===== RENDER QUESTION =====
function renderQuestion(sectionId, qi, q) {
  const key = `${sectionId}_${qi}`;
  const answered = state.answered[key];
  let cardClass = '';
  if (answered) cardClass = answered.correct ? 'correct' : 'wrong';

  const isWeak = state.weakQuestions.some(w => w.sectionId === sectionId && w.qi === qi);
  const diffLabel = q.level === 'gk' ? 'GK' : q.level === 'lk' ? 'LK' : 'Abi';
  const diffBadge = `<span class="diff-badge diff-badge-${q.level}">${diffLabel}</span>`;
  const repeatIcon = isWeak ? '<span class="q-repeat-icon" title="Wiederholen">&#128260;</span>' : '';

  let inner = '';
  const typeLabel = q.type === 'mc' ? 'Multiple Choice' : q.type === 'tf' ? 'Wahr/Falsch' : q.type === 'fill' ? 'Lueckentext' : q.type === 'order' ? 'Reihenfolge' : 'Zuordnung';

  switch (q.type) {
    case 'mc': inner = renderMC(key, q, answered); break;
    case 'tf': inner = renderTF(key, q, answered); break;
    case 'fill': inner = renderFill(key, q, answered); break;
    case 'order': inner = renderOrder(key, q, answered); break;
    case 'match': inner = renderMatch(key, q, answered); break;
  }

  let hintBtn = '';
  if (q.hint && !answered) {
    hintBtn = `<button class="btn btn-hint" onclick="showHint('${key}')" style="margin-bottom:8px;">&#128161; Tipp anzeigen</button>`;
  }
  let hintDiv = '';
  if (q.hint) {
    hintDiv = `<div class="q-hint" id="hint_${key}">${q.hint}</div>`;
  }

  return `<div class="q-card ${cardClass}" id="qcard_${key}">
    <div class="q-num"><span>Frage ${qi + 1} -- ${typeLabel} ${repeatIcon}</span>${diffBadge}</div>
    <div class="q-text">${q.q}</div>
    ${hintBtn}${hintDiv}
    ${inner}
  </div>`;
}

function showHint(key) {
  const el = document.getElementById(`hint_${key}`);
  if (el) el.classList.add('visible');
}

// ===== MC =====
function renderMC(key, q, answered) {
  const letters = ['A', 'B', 'C', 'D'];
  return `<div class="mc-options" id="opts_${key}">
    ${q.opts.map((opt, i) => {
      let cls = '';
      if (answered) {
        cls = 'disabled';
        if (i === q.correct) cls += ' correct-answer';
        if (answered.selected === i && i !== q.correct) cls += ' wrong-answer';
      }
      return `<div class="mc-opt ${cls}" onclick="checkMC('${key}', ${i}, ${q.correct})">
        <span class="opt-letter">${letters[i]}</span>
        <span>${opt}</span>
      </div>`;
    }).join('')}
  </div>
  ${renderFeedback(key, q, answered)}`;
}

function checkMC(key, selected, correct) {
  if (state.answered[key]) return;
  const isCorrect = selected === correct;
  state.answered[key] = { correct: isCorrect, selected };
  updateStreak(isCorrect);
  trackAnswer(key, isCorrect);
  saveState();

}

function checkTF(key, selected, correct) {

// ===== ORDER (with touch support) =====
function renderOrder(key, q, answered) {
  if (answered) {
    return `<div class="order-items">
      ${q.items.map((item, i) => `<div class="order-item correct-pos"><span style="font-weight:700;color:var(--green);margin-right:8px;">${i + 1}.</span> ${item}</div>`).join('')}
    </div>
    ${renderFeedback(key, q, answered)}`;
  }

  const shuffleKey = `shuffle_${key}`;
  if (!window[shuffleKey]) {
    window[shuffleKey] = [...q.items].sort(() => Math.random() - 0.5);
  }
  const shuffled = window[shuffleKey];

  return `<div class="order-items" id="order_${key}">
    ${shuffled.map((item, i) => `<div class="order-item" draggable="true" data-idx="${i}"
      ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dropItem(event, '${key}')"
      ontouchstart="touchDragStart(event, '${key}')" ontouchmove="touchDragMove(event, '${key}')" ontouchend="touchDragEnd(event, '${key}')">
      <span class="drag-handle">&#9776;</span>
      <span>${item}</span>
    </div>`).join('')}
  </div>
  <div class="btn-group"><button class="btn btn-check" onclick="checkOrder('${key}')">Pruefen</button></div>
  ${renderFeedback(key, q, answered)}`;
}

let draggedEl = null;
function dragStart(e) { draggedEl = e.target.closest('.order-item'); e.dataTransfer.effectAllowed = 'move'; }
function dragOver(e) { e.preventDefault(); }
function dropItem(e, key) {
  e.preventDefault();
  const target = e.target.closest('.order-item');
  if (!target || target === draggedEl) return;
  const container = document.getElementById(`order_${key}`);
  const items = [...container.children];
  const dragIdx = items.indexOf(draggedEl);
  const dropIdx = items.indexOf(target);
  if (dragIdx < dropIdx) target.after(draggedEl);
  else target.before(draggedEl);
}

// Touch drag support for mobile
let touchDragEl = null;
let touchStartY = 0;
let touchClone = null;

function touchDragStart(e, key) {
  touchDragEl = e.target.closest('.order-item');
  if (!touchDragEl) return;
  touchStartY = e.touches[0].clientY;
  touchDragEl.classList.add('dragging');
}

function touchDragMove(e, key) {
  if (!touchDragEl) return;
  e.preventDefault();
  const touch = e.touches[0];
  const container = document.getElementById(`order_${key}`);
  if (!container) return;
  const items = [...container.children];
  const touchY = touch.clientY;

  items.forEach(item => item.classList.remove('drag-over'));

  for (const item of items) {
    if (item === touchDragEl) continue;
    const rect = item.getBoundingClientRect();
    if (touchY > rect.top && touchY < rect.bottom) {
      item.classList.add('drag-over');
      break;
    }
  }
}

function touchDragEnd(e, key) {
  if (!touchDragEl) return;
  const container = document.getElementById(`order_${key}`);
  if (!container) { touchDragEl = null; return; }
  const items = [...container.children];
  const touch = e.changedTouches[0];
  const touchY = touch.clientY;

  touchDragEl.classList.remove('dragging');
  items.forEach(item => item.classList.remove('drag-over'));

  for (const item of items) {
    if (item === touchDragEl) continue;
    const rect = item.getBoundingClientRect();
    if (touchY > rect.top && touchY < rect.bottom) {
      const dragIdx = items.indexOf(touchDragEl);
      const dropIdx = items.indexOf(item);
      if (dragIdx < dropIdx) item.after(touchDragEl);
      else item.before(touchDragEl);
      break;
    }
  }
  touchDragEl = null;
}

function checkOrder(key) {
  if (state.answered[key]) return;
  const sectionId = key.split('_')[0];
  const qi = parseInt(key.split('_')[1]);
  const section = sections.find(s => s.id === sectionId);
  const q = section.questions[qi];
  const container = document.getElementById(`order_${key}`);
  const userOrder = [...container.children].map(el => el.querySelector('span:last-child').textContent);
  const isCorrect = userOrder.every((item, i) => item === q.items[i]);
  state.answered[key] = { correct: isCorrect };
  updateStreak(isCorrect);
  trackAnswer(key, isCorrect);
  saveState();
  delete window[`shuffle_${key}`];
  renderSection();
}

// ===== MATCH =====
function renderMatch(key, q, answered) {
  if (answered) {
    return `<div class="match-container">
      <div class="match-col">${q.pairs.map(p => `<div class="match-item matched">${p[0]}</div>`).join('')}</div>
      <div class="match-col">${q.pairs.map(p => `<div class="match-item matched">${p[1]}</div>`).join('')}</div>
    </div>
    ${renderFeedback(key, q, answered)}`;
  }

  const shuffleKey = `mshuffle_${key}`;
  if (!window[shuffleKey]) {
    window[shuffleKey] = {
      right: [...q.pairs.map(p => p[1])].sort(() => Math.random() - 0.5),
      matched: [],
      selectedLeft: null,
      selectedRight: null
    };
  }
  const ms = window[shuffleKey];

  return `<div class="match-container" id="match_${key}">
    <div class="match-col">${q.pairs.map((p, i) => {
      const isMatched = ms.matched.includes(i);
      return `<div class="match-item ${isMatched ? 'matched' : ''} ${ms.selectedLeft === i ? 'selected' : ''}" onclick="matchSelect('${key}', 'left', ${i})">${p[0]}</div>`;
    }).join('')}</div>
    <div class="match-col">${ms.right.map((r, i) => {
      const isMatched = ms.matched.includes(q.pairs.findIndex(p => p[1] === r));
      return `<div class="match-item ${isMatched ? 'matched' : ''} ${ms.selectedRight === i ? 'selected' : ''}" onclick="matchSelect('${key}', 'right', ${i})">${r}</div>`;
    }).join('')}</div>
  </div>
  ${renderFeedback(key, q, answered)}`;
}

function matchSelect(key, side, idx) {
  if (state.answered[key]) return;
  const sectionId = key.split('_')[0];
  const qi = parseInt(key.split('_')[1]);
  const section = sections.find(s => s.id === sectionId);
  const q = section.questions[qi];
  const ms = window[`mshuffle_${key}`];

  if (side === 'left') {
    if (ms.matched.includes(idx)) return;
    ms.selectedLeft = idx;
  } else {
    const pairIdx = q.pairs.findIndex(p => p[1] === ms.right[idx]);
    if (ms.matched.includes(pairIdx)) return;
    ms.selectedRight = idx;
  }

  if (ms.selectedLeft !== null && ms.selectedRight !== null) {
    const rightTerm = ms.right[ms.selectedRight];
    const correctRight = q.pairs[ms.selectedLeft][1];
    if (rightTerm === correctRight) {
      ms.matched.push(ms.selectedLeft);
      ms.selectedLeft = null;
      ms.selectedRight = null;
      if (ms.matched.length === q.pairs.length) {
        state.answered[key] = { correct: true };
        updateStreak(true);
        trackAnswer(key, true);
        saveState();
        delete window[`mshuffle_${key}`];
      }
    } else {
      ms.selectedLeft = null;
      ms.selectedRight = null;
    }
  }
  renderSection();
}

// ===== FLASHCARDS =====
function renderFlashcards(s) {
  const filteredMap = getFilteredIndexMap(s.id);
  if (filteredMap.length === 0) {
    return '<p style="color:var(--text3);text-align:center;padding:40px;">Keine Fragen mit dem aktuellen Filter.</p>';
  }
  const fcKey = `fc_${s.id}`;
  if (!window[fcKey]) window[fcKey] = { index: 0, flipped: false };
  const fc = window[fcKey];
  if (fc.index >= filteredMap.length) fc.index = 0;
  const qi = filteredMap[fc.index];
  const q = s.questions[qi];

  let answer = '';
  if (q.type === 'mc') answer = q.opts[q.correct];
  else if (q.type === 'tf') answer = q.correct ? 'WAHR' : 'FALSCH';
  else if (q.type === 'fill') answer = q.answer[0];
  else if (q.type === 'order') answer = q.items.map((item, i) => `${i + 1}. ${item}`).join('<br>');
  else if (q.type === 'match') answer = q.pairs.map(p => `${p[0]} = ${p[1]}`).join('<br>');

  const diffLabel = q.level === 'gk' ? 'GK' : q.level === 'lk' ? 'LK' : 'Abi';

  return `<div class="flashcard-container">
    <div class="flashcard ${fc.flipped ? 'flipped' : ''}" onclick="flipCard('${s.id}')" style="min-height:220px;">
      <div class="flashcard-face flashcard-front">
        <div class="flashcard-label">Frage ${fc.index + 1} / ${filteredMap.length} <span class="diff-badge diff-badge-${q.level}">${diffLabel}</span></div>
        <div class="flashcard-text">${q.q}</div>
      </div>
      <div class="flashcard-face flashcard-back">
        <div class="flashcard-label">Antwort</div>
        <div class="flashcard-text">${answer}</div>
        <div style="margin-top:12px;font-size:0.85em;color:var(--text2);line-height:1.4;">${q.explain}</div>
      </div>
    </div>
  </div>
  <div class="flashcard-nav">
    <button class="btn btn-secondary" onclick="fcNav('${s.id}', -1)" ${fc.index === 0 ? 'disabled' : ''}>&larr; Zurueck</button>
    <span class="flashcard-counter">${fc.index + 1} / ${filteredMap.length}</span>
    <button class="btn btn-secondary" onclick="fcNav('${s.id}', 1)" ${fc.index === filteredMap.length - 1 ? 'disabled' : ''}>Weiter &rarr;</button>
  </div>
  <p style="text-align:center;color:var(--text3);font-size:0.8em;margin-top:8px;">Klicke auf die Karte zum Umdrehen</p>`;
}

function flipCard(sectionId) {
  const fc = window[`fc_${sectionId}`];
  fc.flipped = !fc.flipped;
  renderSection();
}

function fcNav(sectionId, dir) {
  const fc = window[`fc_${sectionId}`];
  const filteredMap = getFilteredIndexMap(sectionId);
  fc.index = Math.max(0, Math.min(filteredMap.length - 1, fc.index + dir));
  fc.flipped = false;
  renderSection();
}

// ===== SPEED ROUND =====
function startSpeedRound() {
  const s = sections[state.currentSection];
  // Only MC and TF questions
  const pool = [];
  s.questions.forEach((q, qi) => {
    if ((q.type === 'mc' || q.type === 'tf') && state.diffFilter[q.level]) {
      pool.push({ ...q, origIdx: qi });
    }
  });
  if (pool.length < 3) {
    alert('Nicht genug MC/TF-Fragen mit aktuellem Filter fuer eine Speed-Runde!');
    return;
  }
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  speedState = {
    active: true,
    questions: pool,
    currentIndex: 0,
    score: 0,
    timeLeft: 60,
    interval: null,
    finished: false
  };
  state.mode = 'quiz';
  speedState.interval = setInterval(() => {
    speedState.timeLeft--;
    if (speedState.timeLeft <= 0) {
      clearInterval(speedState.interval);
      speedState.finished = true;
      renderSection();
    } else {
      const timerEl = document.getElementById('speedTimer');
      if (timerEl) {
        timerEl.textContent = speedState.timeLeft + 's';
        timerEl.className = 'speed-timer ' + (speedState.timeLeft <= 10 ? 'warning' : 'normal');
      }
    }
  }, 1000);
  renderSection();
}

function renderSpeedRound(s) {
  if (speedState.finished || speedState.currentIndex >= speedState.questions.length) {
    if (speedState.interval) { clearInterval(speedState.interval); speedState.interval = null; }
    const total = speedState.currentIndex;
    return `<div class="summary-card">
      <h3>&#9889; Speed-Runde beendet!</h3>
      <div class="summary-grade ${speedState.score >= total * 0.8 ? 'grade-excellent' : speedState.score >= total * 0.5 ? 'grade-good' : 'grade-bad'}">${speedState.score}/${total}</div>
      <p>${speedState.score} von ${total} Fragen richtig in ${60 - speedState.timeLeft}s</p>
      <div class="btn-group" style="justify-content:center;margin-top:16px;">
        <button class="btn btn-primary" onclick="startSpeedRound()">Nochmal!</button>
        <button class="btn btn-secondary" onclick="speedState.active=false;renderSection();">Zurueck zum Quiz</button>
      </div>
    </div>`;
  }

  const q = speedState.questions[speedState.currentIndex];
  let html = `<div class="speed-timer ${speedState.timeLeft <= 10 ? 'warning' : 'normal'}" id="speedTimer">${speedState.timeLeft}s</div>
    <div class="speed-score">Punkte: ${speedState.score} / ${speedState.currentIndex}</div>`;

  html += `<div class="q-card">
    <div class="q-num"><span>Speed-Frage ${speedState.currentIndex + 1}</span><span class="diff-badge diff-badge-${q.level}">${q.level.toUpperCase()}</span></div>
    <div class="q-text">${q.q}</div>`;

  if (q.type === 'mc') {
    const letters = ['A','B','C','D'];
    html += `<div class="mc-options">`;
    q.opts.forEach((opt, i) => {
      html += `<div class="mc-opt" onclick="speedAnswer('mc', ${i}, ${q.correct})"><span class="opt-letter">${letters[i]}</span><span>${opt}</span></div>`;
    });
    html += `</div>`;
  } else if (q.type === 'tf') {
    html += `<div class="tf-options">`;
    html += `<button class="tf-btn" onclick="speedAnswer('tf', true, ${q.correct})">Wahr</button>`;
    html += `<button class="tf-btn" onclick="speedAnswer('tf', false, ${q.correct})">Falsch</button>`;
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function speedAnswer(type, selected, correct) {
  if (speedState.finished) return;
  let isCorrect;
  if (type === 'mc') isCorrect = selected === correct;
  else isCorrect = selected === correct;
  if (isCorrect) speedState.score++;
  speedState.currentIndex++;
  if (speedState.currentIndex >= speedState.questions.length) {
    speedState.finished = true;
    if (speedState.interval) { clearInterval(speedState.interval); speedState.interval = null; }
  }
  renderSection();
}

// ===== STREAK & TRACKING =====
function updateStreak(correct) {
  if (correct) {
    state.streak++;
    if (state.streak > state.maxStreak) state.maxStreak = state.streak;
    if (state.streak % 5 === 0) launchConfetti();
  } else {
    state.streak = 0;
  }
}

function trackAnswer(key, isCorrect) {
  state.dailyAnswered++;
  if (!isCorrect) {
    const parts = key.split('_');
    const sectionId = parts[0];
    const qi = parseInt(parts[1]);
    if (!state.weakQuestions.some(w => w.sectionId === sectionId && w.qi === qi)) {
      state.weakQuestions.push({ sectionId, qi });
    }
  } else {
    // Remove from weak if answered correctly
    const parts = key.split('_');
    const sectionId = parts[0];
    const qi = parseInt(parts[1]);
    state.weakQuestions = state.weakQuestions.filter(w => !(w.sectionId === sectionId && w.qi === qi));
  }
}

// ===== MODE =====
function setMode(mode) {
  state.mode = mode;
  speedState.active = false;
  if (speedState.interval) { clearInterval(speedState.interval); speedState.interval = null; }
  renderSection();
}

// ===== RESET =====
function resetSection(sectionId) {
  const section = sections.find(s => s.id === sectionId);
  section.questions.forEach((_, qi) => {
    delete state.answered[`${sectionId}_${qi}`];
  });
  section.questions.forEach((_, qi) => {
    delete window[`shuffle_${sectionId}_${qi}`];
    delete window[`mshuffle_${sectionId}_${qi}`];
  });
  state.streak = 0;
  saveState();
  renderSection();
}

function resetAll() {
  if (!confirm('Wirklich ALLES zuruecksetzen?')) return;
  state.answered = {};
  state.streak = 0;
  state.maxStreak = 0;
  state.weakQuestions = [];
  state.dailyAnswered = 0;
  state.feynmanTexts = {};
  state.lastMilestone = 0;
  saveState();
  renderNav();
  renderSection();
}

// ===== CONFETTI =====
function launchConfetti() {
  const colors = ['#22c55e', '#3b82f6', '#a855f7', '#f97316', '#eab308', '#06b6d4'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-10px';
    el.style.width = (Math.random() * 8 + 4) + 'px';
    el.style.height = (Math.random() * 8 + 4) + 'px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(el);
    const duration = Math.random() * 1500 + 1000;
    el.animate([
      { top: '-10px', opacity: 1 },
      { top: '100vh', opacity: 0 }
    ], { duration, easing: 'ease-in' }).onfinish = () => el.remove();
  }
}

    s.questions.forEach((q, qi) => {
      if (state.diffFilter[q.level]) {
        pool.push({ ...q, sourceSection: s.id, sourceTitle: s.title, sourceEmoji: s.emoji, sourceColor: s.color, sourceQi: qi });

    });

  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, 20);
}

      </div>
    </div>`;
    return;
  }

  let html = `<div class="section active">
    <div class="section-header"><h2>\uD83C\uDFB2 Gemischter Test</h2>
    <p class="section-desc">${Object.keys(mixedAnswered).length} / ${mixedQuestions.length} beantwortet</p></div>`;

  mixedQuestions.forEach((q, i) => {
    const key = `mixed_${i}`;
    const answered = mixedAnswered[key];
    let cardClass = answered ? (answered.correct ? 'correct' : 'wrong') : '';
    const tagColor = colorMap[q.sourceColor] || 'var(--text3)';
    const diffLabel = q.level === 'gk' ? 'GK' : q.level === 'lk' ? 'LK' : 'Abi';

    html += `<div class="q-card ${cardClass}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;">
        <div class="q-num" style="margin-bottom:0;"><span>Frage ${i + 1}</span><span class="diff-badge diff-badge-${q.level}">${diffLabel}</span></div>
        <span class="topic-tag" style="background:${tagColor}20;color:${tagColor};border:1px solid ${tagColor}40;">${q.sourceEmoji} ${q.sourceTitle}</span>
      </div>
      <div class="q-text">${q.q}</div>`;

    if (q.type === 'mc') {
      const letters = ['A','B','C','D'];
      html += `<div class="mc-options">`;
      q.opts.forEach((opt, oi) => {
        let cls = '';
        if (answered) {
          cls = 'disabled';
          if (oi === q.correct) cls += ' correct-answer';
          if (answered.selected === oi && oi !== q.correct) cls += ' wrong-answer';
        }
        html += `<div class="mc-opt ${cls}" onclick="checkMixed('${key}', 'mc', ${oi}, ${q.correct})"><span class="opt-letter">${letters[oi]}</span><span>${opt}</span></div>`;
      });
      html += `</div>`;
    } else if (q.type === 'tf') {
      html += `<div class="tf-options">`;
      ['Wahr','Falsch'].forEach((label, ti) => {
        const val = ti === 0;
        let cls = '';
        if (answered) {
          cls = 'disabled';
          if (val === q.correct) cls += ' correct-answer';
          if (answered.selected === val && val !== q.correct) cls += ' wrong-answer';
        }
        html += `<button class="tf-btn ${cls}" onclick="checkMixed('${key}', 'tf', ${val}, ${q.correct})">${label}</button>`;
      });
      html += `</div>`;
    } else if (q.type === 'fill') {
      let inputCls = answered ? (answered.correct ? 'correct' : 'wrong') : '';
      html += `<input type="text" class="fill-input ${inputCls}" id="input_${key}" placeholder="Deine Antwort..." value="${answered?.userInput || ''}" ${answered ? 'disabled' : ''} onkeydown="if(event.key==='Enter')checkMixedFill('${key}')">`;
      if (!answered) html += `<div class="btn-group"><button class="btn btn-check" onclick="checkMixedFill('${key}')">Pruefen</button></div>`;
    } else {
      if (!answered) {
        html += `<div class="btn-group"><button class="btn btn-reveal" onclick="revealMixed('${key}')">Antwort zeigen</button></div>`;
      } else {
        // Show answer for order/match
        if (q.type === 'order') html += `<div style="color:var(--text2);font-size:0.9em;">${q.items.map((item,ii) => `${ii+1}. ${item}`).join('<br>')}</div>`;
        if (q.type === 'match') html += `<div style="color:var(--text2);font-size:0.9em;">${q.pairs.map(p => `${p[0]} = ${p[1]}`).join('<br>')}</div>`;
      }
    }

    if (answered) {
      const cls2 = answered.correct ? 'correct' : 'wrong';
      const icon = answered.correct ? '\u2705' : '\u274C';
      html += `<div class="feedback visible ${cls2}"><strong>${icon} ${answered.correct ? 'Richtig!' : 'Falsch!'}</strong> ${q.explain}</div>`;
    }
    html += `</div>`;
  });

  const answeredCount = Object.keys(mixedAnswered).length;
  if (answeredCount === mixedQuestions.length) {
    const correctCount = Object.values(mixedAnswered).filter(a => a.correct).length;
    const pct = Math.round(correctCount / mixedQuestions.length * 100);
    let grade, gradeClass;
    if (pct >= 90) { grade = 'Ausgezeichnet!'; gradeClass = 'grade-excellent'; }
    else if (pct >= 75) { grade = 'Gut gemacht!'; gradeClass = 'grade-good'; }
    else if (pct >= 50) { grade = 'Weiter ueben!'; gradeClass = 'grade-ok'; }
    else { grade = 'Nochmal ran!'; gradeClass = 'grade-bad'; }
    html += `<div class="summary-card"><h3>Gemischter Test abgeschlossen!</h3>
      <div class="summary-grade ${gradeClass}">${pct}%</div>
      <p>${grade} -- ${correctCount} von ${mixedQuestions.length} richtig</p>
      <div class="btn-group" style="justify-content:center;margin-top:16px;">
        <button class="btn btn-primary" onclick="mixedQuestions=null;mixedAnswered={};renderMixedQuiz();">Neuer Test</button>
      </div></div>`;
  }

  html += '</div>';
  container.innerHTML = html;
}

function toggleDiffMixed(level) {
  state.diffFilter[level] = !state.diffFilter[level];
  if (!state.diffFilter.gk && !state.diffFilter.lk && !state.diffFilter.abi) {
    state.diffFilter[level] = true;
  }
  saveState();
  renderMixedQuiz();
}

function checkMixed(key, type, selected, correct) {
  if (mixedAnswered[key]) return;
  let isCorrect;
  if (type === 'mc') isCorrect = selected === correct;
  else isCorrect = selected === correct;
  mixedAnswered[key] = { correct: isCorrect, selected };
  renderMixedQuiz();
}

function checkMixedFill(key) {
  if (mixedAnswered[key]) return;
  const input = document.getElementById(`input_${key}`);
  const userVal = input.value.trim();
  if (!userVal) return;
  const qi = parseInt(key.split('_')[1]);
  const q = mixedQuestions[qi];
  const isCorrect = q.answer.some(a => a.toLowerCase() === userVal.toLowerCase());
  mixedAnswered[key] = { correct: isCorrect, userInput: userVal };
  renderMixedQuiz();
}

function revealMixed(key) {
  mixedAnswered[key] = { correct: true };
  renderMixedQuiz();
}
