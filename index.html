<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio-Meister: Fotosynthese & Zellatmung — Interaktives Lernportal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
  --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
  --green: #22c55e; --green-bg: rgba(34,197,94,0.12); --green-border: rgba(34,197,94,0.3);
  --blue: #3b82f6; --blue-bg: rgba(59,130,246,0.12); --blue-border: rgba(59,130,246,0.3);
  --purple: #a855f7; --purple-bg: rgba(168,85,247,0.12); --purple-border: rgba(168,85,247,0.3);
  --orange: #f97316; --orange-bg: rgba(249,115,22,0.12); --orange-border: rgba(249,115,22,0.3);
  --red: #ef4444; --red-bg: rgba(239,68,68,0.12); --red-border: rgba(239,68,68,0.3);
  --yellow: #eab308; --yellow-bg: rgba(234,179,8,0.12);
  --cyan: #06b6d4; --cyan-bg: rgba(6,182,212,0.12);
  --radius: 12px; --radius-sm: 8px;
}
html { scroll-behavior: smooth; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
code, .mono { font-family: 'JetBrains Mono', monospace; }

/* ===== LAYOUT ===== */
.container { max-width: 900px; margin: 0 auto; padding: 20px; }
.header { text-align: center; padding: 40px 20px 20px; }
.header h1 { font-size: 2.2em; font-weight: 900; background: linear-gradient(135deg, var(--green), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
.header p { color: var(--text2); font-size: 1.05em; }

/* ===== NAV TABS ===== */
.nav-bar { position: sticky; top: 0; z-index: 100; background: rgba(15,23,42,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 12px 0; }
.nav-tabs { display: flex; gap: 6px; overflow-x: auto; padding: 0 20px; max-width: 900px; margin: 0 auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab { flex-shrink: 0; padding: 10px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: var(--text2); font-size: 0.85em; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; font-family: inherit; min-height: 44px; min-width: 44px; }
.nav-tab:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.nav-tab.active { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
.nav-tab .tab-progress { display: inline-block; margin-left: 6px; font-size: 0.8em; opacity: 0.7; }

/* ===== PROGRESS BAR ===== */
.progress-bar-container { max-width: 900px; margin: 0 auto; padding: 16px 20px 0; }
.progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--cyan)); border-radius: 3px; transition: width 0.5s ease; width: 0%; }
.progress-text { text-align: center; font-size: 0.8em; color: var(--text3); margin-top: 6px; }

/* ===== DAILY GOAL ===== */
.daily-goal { max-width: 900px; margin: 0 auto; padding: 8px 20px; }
.daily-goal-bar { display: flex; align-items: center; gap: 12px; background: var(--bg2); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius-sm); padding: 10px 16px; font-size: 0.85em; }
.daily-goal-bar .goal-icon { font-size: 1.2em; }
.daily-goal-bar .goal-text { flex: 1; color: var(--text2); }
.daily-goal-bar .goal-text strong { color: var(--text); }
.daily-goal-progress { flex: 0 0 120px; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.daily-goal-progress-fill { height: 100%; background: linear-gradient(90deg, var(--orange), var(--yellow)); border-radius: 4px; transition: width 0.4s; }
.daily-goal-count { font-weight: 700; color: var(--yellow); min-width: 50px; text-align: right; }

/* ===== POMODORO TIMER ===== */
.pomodoro-widget { max-width: 900px; margin: 0 auto; padding: 4px 20px 0; }
.pomodoro-bar { display: flex; align-items: center; gap: 12px; background: var(--bg2); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius-sm); padding: 8px 16px; font-size: 0.85em; cursor: pointer; user-select: none; }
.pomodoro-bar.hidden-timer .pomodoro-details { display: none; }
.pomodoro-toggle-label { color: var(--text2); font-weight: 600; display: flex; align-items: center; gap: 6px; }
.pomodoro-details { display: flex; align-items: center; gap: 12px; flex: 1; }
.pomodoro-time { font-family: 'JetBrains Mono', monospace; font-size: 1.4em; font-weight: 700; color: var(--green); min-width: 70px; text-align: center; }
.pomodoro-time.break-mode { color: var(--orange); }
.pomodoro-status { color: var(--text2); font-size: 0.85em; }
.pomodoro-btns { display: flex; gap: 6px; }
.pomodoro-btns button { padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text); font-size: 0.8em; font-weight: 600; cursor: pointer; font-family: inherit; min-height: 36px; min-width: 36px; }
.pomodoro-btns button:hover { background: rgba(255,255,255,0.06); }
.pomodoro-btns button.active { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }

/* ===== STATS CARDS ===== */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
.stat-card { background: var(--bg2); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 16px; text-align: center; }
.stat-card .stat-num { font-size: 1.8em; font-weight: 800; }
.stat-card .stat-label { font-size: 0.75em; color: var(--text3); margin-top: 4px; }
.stat-green .stat-num { color: var(--green); }
.stat-red .stat-num { color: var(--red); }
.stat-blue .stat-num { color: var(--blue); }
.stat-yellow .stat-num { color: var(--yellow); }

/* ===== SECTION ===== */
.section { display: none; }
.section.active { display: block; }
.section-header { padding: 30px 0 20px; }
.section-header h2 { font-size: 1.6em; font-weight: 800; margin-bottom: 4px; }
.section-header .section-desc { color: var(--text2); font-size: 0.95em; }
.section-emoji { font-size: 1.4em; margin-right: 8px; }

/* ===== MODE TOGGLE ===== */
.mode-toggle { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
.mode-btn { padding: 10px 20px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text2); font-size: 0.85em; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; min-height: 44px; }
.mode-btn.active { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-border); }
.mode-btn.speed-active { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); }

/* ===== DIFFICULTY FILTER ===== */
.difficulty-filter { display: flex; gap: 8px; margin: 0 0 16px; flex-wrap: wrap; align-items: center; }
.difficulty-filter .filter-label { font-size: 0.8em; color: var(--text3); font-weight: 600; margin-right: 4px; }
.diff-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text3); font-size: 0.78em; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; min-height: 36px; text-transform: uppercase; letter-spacing: 0.03em; }
.diff-btn.active-gk { background: rgba(34,197,94,0.15); color: #22c55e; border-color: rgba(34,197,94,0.4); }
.diff-btn.active-lk { background: rgba(59,130,246,0.15); color: #3b82f6; border-color: rgba(59,130,246,0.4); }
.diff-btn.active-abi { background: rgba(239,68,68,0.15); color: #ef4444; border-color: rgba(239,68,68,0.4); }

/* ===== DIFFICULTY BADGES ===== */
.diff-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.65em; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-left: 8px; vertical-align: middle; }
.diff-badge-gk { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
.diff-badge-lk { background: rgba(59,130,246,0.15); color: #3b82f6; border: 1px solid rgba(59,130,246,0.3); }
.diff-badge-abi { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

/* ===== QUESTION CARD ===== */
.q-card { background: var(--bg2); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; transition: border-color 0.3s; }
.q-card.correct { border-color: var(--green); }
.q-card.wrong { border-color: var(--red); }
.q-card.revealed { border-color: var(--blue-border); }
.q-num { font-size: 0.75em; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.q-text { font-size: 1.05em; font-weight: 600; margin-bottom: 16px; line-height: 1.5; }
.q-hint { font-size: 0.85em; color: var(--text3); font-style: italic; margin-bottom: 12px; padding: 8px 12px; background: var(--yellow-bg); border-radius: var(--radius-sm); border-left: 3px solid var(--yellow); display: none; }
.q-hint.visible { display: block; }
.q-repeat-icon { display: inline-block; margin-left: 6px; color: var(--orange); font-size: 1em; vertical-align: middle; }

/* ===== MC OPTIONS ===== */
.mc-options { display: flex; flex-direction: column; gap: 8px; }
.mc-opt { padding: 14px 16px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); cursor: pointer; transition: all 0.2s; font-size: 0.95em; display: flex; align-items: flex-start; gap: 10px; min-height: 48px; }
.mc-opt:hover:not(.disabled) { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }
.mc-opt .opt-letter { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 0.8em; font-weight: 700; }
.mc-opt.selected { border-color: var(--blue); background: var(--blue-bg); }
.mc-opt.correct-answer { border-color: var(--green); background: var(--green-bg); }
.mc-opt.correct-answer .opt-letter { background: var(--green); color: #000; }
.mc-opt.wrong-answer { border-color: var(--red); background: var(--red-bg); opacity: 0.7; }
.mc-opt.disabled { pointer-events: none; }

/* ===== FILL-IN ===== */
.fill-input { width: 100%; padding: 14px 16px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: var(--text); font-size: 0.95em; font-family: inherit; outline: none; transition: border-color 0.2s; min-height: 48px; }
.fill-input:focus { border-color: var(--blue); }
.fill-input.correct { border-color: var(--green); background: var(--green-bg); }
.fill-input.wrong { border-color: var(--red); background: var(--red-bg); }

/* ===== TRUE/FALSE ===== */
.tf-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.tf-btn { padding: 14px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); cursor: pointer; font-size: 1em; font-weight: 600; text-align: center; transition: all 0.2s; font-family: inherit; color: var(--text); min-height: 48px; }
.tf-btn:hover:not(.disabled) { background: rgba(255,255,255,0.06); }
.tf-btn.selected { border-color: var(--blue); background: var(--blue-bg); }
.tf-btn.correct-answer { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.tf-btn.wrong-answer { border-color: var(--red); background: var(--red-bg); color: var(--red); }

/* ===== ORDER / DRAG ===== */
.order-items { display: flex; flex-direction: column; gap: 6px; }
.order-item { padding: 14px 16px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); cursor: grab; display: flex; align-items: center; gap: 10px; transition: all 0.2s; user-select: none; min-height: 48px; touch-action: none; }
.order-item:active { cursor: grabbing; }
.order-item .drag-handle { color: var(--text3); font-size: 1.2em; }
.order-item.dragging { opacity: 0.5; background: var(--blue-bg); border-color: var(--blue); }
.order-item.drag-over { border-color: var(--cyan); border-style: dashed; }
.order-item.correct-pos { border-color: var(--green); background: var(--green-bg); }
.order-item.wrong-pos { border-color: var(--red); background: var(--red-bg); }

/* ===== FEEDBACK ===== */
.feedback { padding: 12px 16px; border-radius: var(--radius-sm); margin-top: 12px; font-size: 0.9em; line-height: 1.5; display: none; }
.feedback.visible { display: block; }
.feedback.correct { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
.feedback.wrong { background: var(--red-bg); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
.feedback.info { background: var(--blue-bg); border: 1px solid var(--blue-border); color: #93c5fd; }
.feedback strong { font-weight: 700; }

/* ===== BUTTONS ===== */
.btn { padding: 10px 24px; border-radius: var(--radius-sm); border: none; font-size: 0.9em; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; min-height: 44px; }
.btn-primary { background: var(--green); color: #000; }
.btn-primary:hover { background: #16a34a; }
.btn-secondary { background: var(--bg3); color: var(--text); }
.btn-secondary:hover { background: rgba(255,255,255,0.15); }
.btn-hint { background: transparent; border: 1px solid var(--yellow); color: var(--yellow); font-size: 0.8em; padding: 6px 14px; min-height: 36px; }
.btn-hint:hover { background: var(--yellow-bg); }
.btn-group { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.btn-check { background: var(--blue); color: #fff; }
.btn-check:hover { background: #2563eb; }
.btn-reveal { background: transparent; border: 1px solid var(--purple); color: var(--purple); }
.btn-reveal:hover { background: var(--purple-bg); }

/* ===== FLASHCARD ===== */
.flashcard-container { perspective: 1000px; margin: 20px 0; }
.flashcard { width: 100%; min-height: 200px; position: relative; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard-face { position: absolute; width: 100%; min-height: 200px; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: var(--radius); padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.flashcard-front { background: linear-gradient(135deg, var(--bg2), var(--bg3)); border: 1px solid rgba(255,255,255,0.1); }
.flashcard-back { background: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(6,182,212,0.08)); border: 1px solid var(--green-border); transform: rotateY(180deg); }
.flashcard-label { font-size: 0.7em; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
.flashcard-text { font-size: 1.1em; line-height: 1.6; }
.flashcard-nav { display: flex; justify-content: center; gap: 12px; margin-top: 16px; align-items: center; }
.flashcard-counter { font-size: 0.85em; color: var(--text3); }

/* ===== SUMMARY ===== */
.summary-card { background: linear-gradient(135deg, var(--bg2), rgba(34,197,94,0.05)); border: 1px solid var(--green-border); border-radius: var(--radius); padding: 30px; text-align: center; margin: 30px 0; }
.summary-card h3 { font-size: 1.4em; margin-bottom: 16px; }
.summary-grade { font-size: 4em; font-weight: 900; margin: 10px 0; }
.grade-excellent { color: var(--green); }
.grade-good { color: var(--cyan); }
.grade-ok { color: var(--yellow); }
.grade-bad { color: var(--red); }
.summary-detail { color: var(--text2); margin-top: 8px; }
.retry-wrong { margin-top: 20px; }

/* ===== MATCH PAIRS ===== */
.match-container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.match-col { display: flex; flex-direction: column; gap: 8px; }
.match-item { padding: 14px; border-radius: var(--radius-sm); border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); cursor: pointer; transition: all 0.2s; font-size: 0.9em; text-align: center; min-height: 48px; display: flex; align-items: center; justify-content: center; }
.match-item.selected { border-color: var(--blue); background: var(--blue-bg); }
.match-item.matched { border-color: var(--green); background: var(--green-bg); opacity: 0.6; pointer-events: none; }
.match-item.wrong-match { border-color: var(--red); background: var(--red-bg); animation: shake 0.3s; }

/* ===== DIAGRAM ===== */
.diagram-card { background: var(--bg2); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); padding: 20px; margin: 16px 0; text-align: center; }
.diagram-card h4 { font-size: 0.9em; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
.diagram-card svg { max-width: 100%; height: auto; }
.diagram-card svg text { font-family: 'Inter', sans-serif; }
.diagram-label { fill: var(--text); font-size: 11px; font-weight: 600; }
.diagram-sublabel { fill: var(--text2); font-size: 9px; }

/* ===== MIXED QUIZ ===== */
.mixed-intro { background: linear-gradient(135deg, rgba(168,85,247,0.08), rgba(59,130,246,0.08)); border: 1px solid var(--purple-border); border-radius: var(--radius); padding: 24px; margin: 16px 0; text-align: center; }
.mixed-intro p { color: var(--text2); margin-top: 8px; font-size: 0.95em; }
.topic-tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7em; font-weight: 700; margin-bottom: 8px; }

/* ===== SPEED ROUND ===== */
.speed-timer { font-family: 'JetBrains Mono', monospace; font-size: 2.5em; font-weight: 800; text-align: center; margin: 16px 0; }
.speed-timer.warning { color: var(--red); animation: pulse 0.5s infinite; }
.speed-timer.normal { color: var(--green); }
.speed-score { text-align: center; font-size: 1.2em; color: var(--text2); margin-bottom: 16px; }

/* ===== FEYNMAN CARD ===== */
.feynman-card { background: linear-gradient(135deg, rgba(6,182,212,0.08), rgba(34,197,94,0.08)); border: 1px solid rgba(6,182,212,0.3); border-radius: var(--radius); padding: 24px; margin: 20px 0; }
.feynman-card h3 { color: var(--cyan); margin-bottom: 8px; font-size: 1.2em; }
.feynman-card p { color: var(--text2); font-size: 0.9em; margin-bottom: 12px; }
.feynman-textarea { width: 100%; min-height: 120px; padding: 14px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: var(--text); font-size: 0.95em; font-family: inherit; outline: none; resize: vertical; line-height: 1.6; }
.feynman-textarea:focus { border-color: var(--cyan); }

/* ===== WEAK QUESTIONS ===== */
.weak-section { background: var(--orange-bg); border: 1px solid var(--orange-border); border-radius: var(--radius); padding: 20px; margin: 16px 0; }
.weak-section h3 { color: var(--orange); font-size: 1.1em; margin-bottom: 8px; }
.weak-section p { color: var(--text2); font-size: 0.9em; margin-bottom: 12px; }
.weak-list { display: flex; flex-direction: column; gap: 8px; }
.weak-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: rgba(0,0,0,0.2); border-radius: var(--radius-sm); font-size: 0.88em; color: var(--text2); }
.weak-item .weak-q { flex: 1; }
.weak-item .weak-section-tag { font-size: 0.75em; font-weight: 700; color: var(--orange); }

/* ===== ANIMATIONS ===== */
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes celebrateIn { 0% { transform: scale(0) rotate(-180deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
.q-card { animation: fadeIn 0.3s ease; }

/* ===== MILESTONE CELEBRATION ===== */
.milestone-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); animation: fadeIn 0.3s; }
.milestone-content { text-align: center; animation: celebrateIn 0.5s ease; }
.milestone-emoji { font-size: 4em; display: block; margin-bottom: 12px; }
.milestone-text { font-size: 1.5em; font-weight: 800; color: var(--green); }
.milestone-sub { font-size: 1em; color: var(--text2); margin-top: 8px; }

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .header h1 { font-size: 1.6em; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .nav-tab { padding: 8px 12px; font-size: 0.78em; }
  .match-container { grid-template-columns: 1fr; }
  .q-card { padding: 18px; }
  .mode-toggle { gap: 6px; }
  .mode-btn { padding: 8px 14px; font-size: 0.8em; }
  .difficulty-filter { gap: 6px; }
  .diff-btn { padding: 5px 10px; font-size: 0.72em; }
  .pomodoro-bar { flex-wrap: wrap; }
  .pomodoro-time { font-size: 1.2em; }
  .daily-goal-bar { flex-wrap: wrap; }
  .daily-goal-progress { flex: 1 1 100%; }

<script>
// ===== QUESTION DATABASE =====
const sections = [
  {
    id: "blatt",
    title: "Aufbau des Laubblattes",
    emoji: "\uD83C\uDF3F",
    color: "green",
    questions: [
      { type:"mc", level:"lk", q:"Was bedeutet 'bifazial' bei einem Laubblatt?", opts:["Oberseite und Unterseite sind gleich aufgebaut","Oberseite und Unterseite sind unterschiedlich aufgebaut","Das Blatt hat zwei Blatthaelften","Das Blatt hat zwei Epidermen ohne Unterschied"], correct:1, explain:"Bifazial bedeutet, dass die Oberseite (Lichtaufnahme) und die Unterseite (Gasaustausch) unterschiedlich aufgebaut sind." },
      { type:"order", level:"lk", q:"Ordne die Schichten des Blattes von OBEN nach UNTEN:", items:["Obere Kutikula","Obere Epidermis","Palisadenparenchym","Schwammparenchym","Untere Epidermis","Untere Kutikula"], explain:"Die korrekte Reihenfolge zeigt den bifazialen Aufbau: Schutz oben, Photosynthese in der Mitte, Gasaustausch unten." },
      { type:"mc", level:"lk", q:"Woraus besteht die Kutikula chemisch?", opts:["Cellulose und Lignin","Cutin (wachsartiges Polymer) und Wachse","Chlorophyll und Carotinoide","Proteine und Lipide"], correct:1, explain:"Die Kutikula ist eine Abscheidung der Epidermiszellen aus Cutin und Wachsen — sie ist hydrophob und schuetzt vor Wasserverlust." },
      { type:"tf", level:"lk", q:"Die obere Kutikula ist duenner als die untere Kutikula.", correct:false, explain:"Die obere Kutikula ist DICKER, weil die Blattoberseite der direkten Sonneneinstrahlung ausgesetzt ist und dort der Verdunstungsschutz wichtiger ist." },
      { type:"mc", level:"lk", q:"Warum haben normale Epidermiszellen KEINE Chloroplasten?", opts:["Weil sie zu klein sind","Damit das Licht zum Palisadenparenchym durchkommt","Weil sie tot sind","Weil sie keine DNA haben"], correct:1, explain:"Epidermiszellen sind durchsichtig wie ein Fenster. Waeren sie gruen, wuerden sie das Licht absorbieren, bevor es die Palisadenzellen erreicht." },
      { type:"fill", level:"gk", q:"Die Zellen des Palisadenparenchyms enthalten ca. ___% aller Chloroplasten im Blatt.", answer:["80","80%"], explain:"Ca. 80% aller Chloroplasten befinden sich im Palisadenparenchym — es ist der 'Motor' der Fotosynthese." },
      { type:"mc", level:"gk", q:"Was ist das wichtigste strukturelle Merkmal des Schwammparenchyms?", opts:["Dicht gepackte Saeulenzellen","Grosse luftgefuellte Interzellularen","Fehlende Zellwaende","Besonders viele Chloroplasten"], correct:1, explain:"Die grossen Interzellularen bilden ein Roehrensystem fuer den Gasaustausch (CO2 rein, O2 raus, H2O-Dampf fuer Transpiration)." },
      { type:"mc", level:"gk", q:"Was transportiert das Xylem?", opts:["Zucker von den Blaettern weg","Wasser und Mineralsalze von den Wurzeln ins Blatt","Sauerstoff zu den Zellen","Aminosaeuren aus dem Boden"], correct:1, explain:"Xylem = Gefaessteil: transportiert Wasser + Mineralsalze aufwaerts. Phloem = Siebteil: transportiert Assimilate (Zucker) abwaerts." },
      { type:"mc", level:"lk", q:"Was ist die Funktion der Buendelscheide?", opts:["Photosynthese betreiben","Wasser speichern","Stoffaustausch kontrollieren und Luft aus Leitbahnen fernhalten","Zucker produzieren"], correct:2, explain:"Die Buendelscheide ist eine 'Zollstation' — sie kontrolliert den Stoffaustausch und verhindert Embolien (Luft in den Wasserleitungen)." },
      { type:"tf", level:"gk", q:"Spaltoeffnungen (Stomata) befinden sich bei Mesophyten hauptsaechlich auf der OBEREN Epidermis.", correct:false, explain:"Stomata sind fast ausschliesslich auf der UNTEREN Epidermis — das minimiert den Wasserverlust durch Sonneneinstrahlung und Wind." },
      { type:"mc", level:"lk", q:"Was ist das Besondere an Schliesszellen im Vergleich zu normalen Epidermiszellen?", opts:["Sie sind groesser","Sie besitzen Chloroplasten","Sie haben keine Zellwand","Sie sind immer geoeffnet"], correct:1, explain:"Schliesszellen haben — als Ausnahme in der Epidermis — Chloroplasten. Das liefert Energie/ATP fuer den Oeffnungsmechanismus." },
      { type:"mc", level:"lk", q:"Wie oeffnet sich ein Stoma?", opts:["Durch Muskelkontraktion","Durch hohen Turgor (Wasserdruck) in den Schliesszellen","Durch Lichteinfall direkt auf den Porus","Durch Hormone aus den Wurzeln"], correct:1, explain:"Viel Wasser = hoher Turgor = Zellen kruemmen sich nach aussen = Spalt oeffnet sich. Wenig Wasser = niedriger Turgor = Spalt schliesst." },
      { type:"mc", level:"abi", q:"Welches Dilemma muessen Pflanzen mit den Spaltoeffnungen loesen?", opts:["Licht vs. Schatten","CO2-Aufnahme vs. Wasserverlust","Wachstum vs. Reproduktion","Naehrstoffaufnahme vs. Energieverbrauch"], correct:1, explain:"Das Transpirations-Photosynthese-Dilemma: Offen = CO2 rein (gut) aber Wasser raus (schlecht). Die Pflanze muss zwischen 'Verhungern' und 'Verdursten' abwaegen." },
      { type:"mc", level:"lk", q:"Warum ist das Blatt flach UND duenn?", opts:["Damit es leicht ist","Flach = max. Lichtflaeche, duenn = kurze Diffusionswege fuer Gase","Damit es vom Wind bewegt wird","Fuer effiziente Waermeabgabe"], correct:1, explain:"Flach = maximale Oberflaeche fuer Photonen. Duenn = CO2 muss nur kurz diffundieren, um von unten zu den Palisadenzellen zu gelangen." },
      { type:"match", level:"lk", q:"Ordne die Strukturen ihren Funktionen zu:", pairs:[["Palisadenparenchym","Lichtabsorption & Photosynthese"],["Schwammparenchym","Gasaustausch & Belueftung"],["Kutikula","Verdunstungsschutz"],["Xylem","Wasser- & Mineraltransport"],["Phloem","Zuckertransport"]], explain:"Jede Struktur im Blatt hat eine spezialisierte Funktion — das ist die Struktur-Funktions-Beziehung." },
      // ===== NEW Laubblatt questions =====
      { type:"mc", level:"gk", q:"Was ist die Hauptfunktion des Palisadenparenchyms?", opts:["Gasaustausch","Fotosynthese","Wasserspeicherung","Stuetzfunktion"], correct:1, explain:"Das Palisadenparenchym ist der Hauptort der Fotosynthese — die dicht gepackten, saeulenartig angeordneten Zellen enthalten die meisten Chloroplasten." },
      { type:"tf", level:"gk", q:"Die Kutikula besteht aus Cellulose.", correct:false, explain:"Die Kutikula besteht aus Cutin (einem wachsartigen Polymer) und Wachsen, NICHT aus Cellulose. Cellulose bildet die Zellwand." },
      { type:"mc", level:"lk", q:"Welche Besonderheit haben C4-Pflanzen bezueglich der Buendelscheidenzellen?", opts:["Sie haben keine Buendelscheidenzellen","Sie haben Chloroplasten in den Buendelscheidenzellen und betreiben dort Fotosynthese (Kranz-Anatomie)","Ihre Buendelscheidenzellen sind tot","Die Buendelscheidenzellen speichern Staerke"], correct:1, explain:"C4-Pflanzen (z.B. Mais) zeigen eine besondere Kranz-Anatomie: Die Buendelscheidenzellen enthalten Chloroplasten und fuehren den Calvin-Zyklus durch, waehrend die Mesophyllzellen die CO2-Vorfixierung uebernehmen." },
      { type:"fill", level:"lk", q:"Der Wasserverlust ueber die Blattoberflaeche nennt man _____.", answer:["Transpiration","transpiration"], explain:"Die Transpiration ist die Verdunstung von Wasser ueber die Spaltoffnungen (stomataere Transpiration) und die Kutikula (kuticulaere Transpiration)." },
      { type:"mc", level:"abi", q:"Ein Experiment zeigt: Bei Abdichtung der Blattunterseite sinkt die Fotosyntheserate um 95%. Erklaere dies.", opts:["Die Epidermis wurde beschaedigt","Stomata auf der Unterseite sind blockiert — kein CO2 kann eintreten","Das Licht wird von unten blockiert","Die Leitbuendel wurden unterbrochen"], correct:1, hint:"Denke daran, wo die meisten Stomata bei Mesophyten sitzen und welches Gas fuer die Fotosynthese gebraucht wird.", explain:"Bei Mesophyten befinden sich ~95% der Stomata auf der Blattunterseite. Werden diese blockiert, kann kein CO2 mehr eindringen, und ohne CO2 kann der Calvin-Zyklus nicht ablaufen — die Fotosyntheserate sinkt drastisch." },
      { type:"mc", level:"abi", q:"Warum haben Schattenpflanzen oft groessere, duennere Blaetter als Sonnenpflanzen?", opts:["Sie brauchen mehr Wasser","Maximale Lichtabsorptionsflaeche bei geringer Lichtverfuegbarkeit","Sie wachsen schneller","Sie haben weniger Chloroplasten"], correct:1, hint:"Ueberlege, welchen Vorteil eine groessere Blattflaeche bei wenig Licht hat.", explain:"Schattenpflanzen (Schattenblatttyp) maximieren die Lichtauffangflaeche durch groessere, duennere Blaetter mit weniger Palisadenzellschichten. So koennen sie auch bei wenig Licht ausreichend Photonen einfangen." },
      { type:"tf", level:"gk", q:"Das Schwammparenchym liegt ueber dem Palisadenparenchym.", correct:false, explain:"Das Palisadenparenchym liegt OBEN (zur Lichtseite) und das Schwammparenchym liegt DARUNTER. Das Schwammparenchym ist zur Blattunterseite hin orientiert, wo der Gasaustausch stattfindet." },
      { type:"match", level:"lk", q:"Ordne die Pflanzenadaptationen den Pflanzentypen zu:", pairs:[["Dicke Kutikula, eingesenkte Stomata","Xerophyt (Trockenpflanze)"],["Stomata auf Blattunterseite","Mesophyt (Normalpflanze)"],["Grosse, duenne Blaetter","Schattenpflanze"],["Luftkammern im Blatt","Hydrophyt (Wasserpflanze)"]], explain:"Verschiedene Pflanzentypen haben unterschiedliche Blattadaptationen, die an ihren jeweiligen Lebensraum angepasst sind." }
    ]
  },
  {
    id: "chloroplast",
    title: "Chloroplast & Licht",
    emoji: "\uD83C\uDFED",
    color: "cyan",
    questions: [
      { type:"mc", level:"gk", q:"Wie viele Membranen besitzt ein Chloroplast?", opts:["Eine","Zwei (Doppelmembran)","Drei","Vier"], correct:1, explain:"Doppelmembran (aeussere + innere). Dies ist ein Hinweis auf die Endosymbiontentheorie — Chloroplasten waren frueher eigenstaendige Bakterien." },
      { type:"mc", level:"gk", q:"Wo findet der Calvin-Zyklus (Sekundaerreaktion) statt?", opts:["In der Thylakoidmembran","Im Thylakoidlumen","Im Stroma","Im Intermembranraum"], correct:2, explain:"Das Stroma ist die fluessige Grundsubstanz im Chloroplasten. Hier befinden sich Enzyme wie Rubisco, DNA und Ribosomen." },
      { type:"fill", level:"gk", q:"Gestapelte Thylakoide nennt man _____.", answer:["Grana","grana","Granum","granum"], explain:"Grana (Singular: Granum) sind wie Geldrollenstapel. Hier findet der Grossteil der Lichtreaktion statt. Die Stapelung maximiert die Membranflaeche." },
      { type:"mc", level:"lk", q:"Warum ist die Stapelung der Thylakoide (Grana) biologisch sinnvoll?", opts:["Bessere Waermeleitung","Oberflaechenvergroesserung fuer maximale Lichtausbeute","Stabilisierung des Chloroplasten","Schnellerer Transport im Stroma"], correct:1, explain:"In der Thylakoidmembran sitzen Chlorophyll-Pigmente. Mehr Membranflaeche = mehr Pigmente = mehr Lichtausbeute in kleinem Raum." },
      { type:"mc", level:"gk", q:"Welchen Wellenlaengenbereich nutzen Pflanzen fuer Fotosynthese?", opts:["100-400 nm (UV)","400-700 nm (sichtbares Licht)","700-1000 nm (Infrarot)","Alle Wellenlaengen gleichmaessig"], correct:1, explain:"400 nm = violett/blau (energiereich) bis 700 nm = rot (energieaermer). Das sichtbare Licht liefert die Energie." },
      { type:"mc", level:"lk", q:"Warum erscheinen Blaetter GRUEN?", opts:["Weil Chlorophyll gruenes Licht besonders gut absorbiert","Weil gruenes Licht reflektiert/transmittiert wird (Gruenluecke)","Weil gruenes Licht die meiste Energie hat","Weil Carotinoide gruen sind"], correct:1, explain:"Die 'Gruenluecke': Chlorophyll absorbiert blau (~430-450nm) und rot (~640-680nm) gut, aber NICHT gruen (~500-550nm). Gruenes Licht wird reflektiert — deshalb sehen wir gruen." },
      { type:"tf", level:"abi", q:"Das Wirkungsspektrum der Fotosynthese deckt sich zu 100% mit dem Absorptionsspektrum von reinem Chlorophyll a.", correct:false, explain:"Das Wirkungsspektrum ist BREITER, weil Hilfspigmente (Chlorophyll b, Carotinoide) Licht auch in Bereichen absorbieren, wo Chlorophyll a eine Luecke hat, und die Energie weiterleiten." },
      { type:"mc", level:"abi", q:"Was passiert, wenn blaues Licht auf Chlorophyll trifft (im Vergleich zu rotem)?", opts:["Blau hat weniger Energie","Blau hebt Elektron auf hohes Niveau (S2), das schnell auf S1 faellt","Blau wird komplett reflektiert","Blau loest keine Reaktion aus"], correct:1, explain:"Blaues Licht = S2 (hohes Energieniveau, faellt mit Waermeverlust auf S1). Rotes Licht = direkt S1. Erst von S1 startet die chemische Arbeit." },
      { type:"match", level:"lk", q:"Ordne die Pigmente ihren Eigenschaften zu:", pairs:[["Chlorophyll a","Zentrales Fotosynthese-Pigment"],["Chlorophyll b","Hilfspigment, erweitert Lichtspektrum"],["Carotinoide","Orange-gelb, Schutz vor Sonnenbrand"]], explain:"Die verschiedenen Pigmente arbeiten zusammen fuer maximale Lichtausnutzung und Schutz." },
      { type:"mc", level:"lk", q:"Was passiert, wenn Licht auf ein Blatt trifft? (3 Moeglichkeiten)", opts:["Nur Absorption","Reflexion, Transmission und Absorption","Nur Reflexion und Absorption","Refraktion, Beugung und Emission"], correct:1, explain:"Reflexion (zurueckgeworfen), Transmission (hindurchgelassen), Absorption (verschluckt). Nur absorbiertes Licht kann chemische Arbeit verrichten!" },
      // ===== NEW Chloroplast & Licht questions =====
      { type:"mc", level:"gk", q:"Welche Farbe hat Chlorophyll?", opts:["Gelb","Rot","Gruen","Blau"], correct:2, explain:"Chlorophyll erscheint gruen, weil es gruenes Licht reflektiert und rotes sowie blaues Licht absorbiert." },
      { type:"tf", level:"gk", q:"Chloroplasten haben eigene DNA.", correct:true, explain:"Ja! Chloroplasten besitzen eigene ringfoermige DNA (wie Bakterien). Das ist ein wichtiger Hinweis auf die Endosymbiontentheorie." },
      { type:"mc", level:"lk", q:"Was besagt die Endosymbiontentheorie ueber Chloroplasten?", opts:["Sie entstehen aus dem Zellkern","Sie waren ehemals eigenstaendige Cyanobakterien","Sie stammen von Mitochondrien ab","Sie wurden kuenstlich erzeugt"], correct:1, explain:"Nach der Endosymbiontentheorie wurden Cyanobakterien von einer Wirtszelle aufgenommen und entwickelten sich zu Chloroplasten. Hinweise: Doppelmembran, eigene DNA, eigene Ribosomen, eigenstaendige Teilung." },
      { type:"fill", level:"lk", q:"Das Absorptionsmaximum von Chlorophyll a liegt bei ca. ___ nm (rotes Licht).", answer:["680","680nm","680 nm"], explain:"Chlorophyll a hat zwei Absorptionsmaxima: bei ca. 430 nm (blaues Licht) und bei ca. 680 nm (rotes Licht). Das rote Maximum ist wichtig fuer das Reaktionszentrum P680 des Fotosystems II." },
      { type:"mc", level:"abi", q:"Engelmanns Bakterienversuch zeigt: Bakterien sammeln sich bei blauem und rotem Licht. Was beweist das?", opts:["Bakterien moegen farbiges Licht","Das Wirkungsspektrum der Fotosynthese entspricht dem Absorptionsspektrum","Bakterien betreiben Fotosynthese","Gruenes Licht toetet Bakterien"], correct:1, hint:"Die aerotaktischen Bakterien sammeln sich dort, wo am meisten O2 freigesetzt wird.", explain:"Engelmann zeigte mit Fadenalgen im Lichtspektrum: Bakterien sammeln sich bei blau und rot, weil dort die meiste Fotosynthese stattfindet (= meiste O2-Produktion). Das Wirkungsspektrum der Fotosynthese entspricht dem Absorptionsspektrum der Fotosynthesepigmente." },
      { type:"mc", level:"abi", q:"Warum ist das Wirkungsspektrum breiter als das Absorptionsspektrum von reinem Chlorophyll a?", opts:["Weil Chlorophyll a ineffizient arbeitet","Weil akzessorische Pigmente (Chlorophyll b, Carotinoide) den nutzbaren Lichtbereich erweitern","Weil Wasser zusaetzliches Licht absorbiert","Weil die Zellwand Licht bricht"], correct:1, hint:"Denke an die verschiedenen Pigmente im Lichtsammelkomplex.", explain:"Akzessorische Pigmente wie Chlorophyll b und Carotinoide absorbieren Licht in Wellenlaengenbereichen, die Chlorophyll a schlecht absorbiert, und leiten die Energie per Resonanztransfer weiter. Deshalb ist das Wirkungsspektrum breiter als das Absorptionsspektrum von reinem Chlorophyll a." },
      { type:"mc", level:"gk", q:"In welchem Zellorganell findet Fotosynthese statt?", opts:["Mitochondrium","Zellkern","Chloroplast","Ribosom"], correct:2, explain:"Die Fotosynthese findet in den Chloroplasten statt — gruene Organellen, die in pflanzlichen Zellen und Algen vorkommen." },
      { type:"mc", level:"lk", q:"Was passiert bei der Fluoreszenz von Chlorophyll?", opts:["Das Chlorophyll wird zerstoert","Ein angeregtes Elektron faellt zurueck und gibt Energie als Licht ab","CO2 wird fixiert","Wasser wird gespalten"], correct:1, explain:"Bei der Fluoreszenz faellt ein angeregtes Elektron vom angeregten Zustand zurueck auf das Grundniveau und gibt dabei die ueberschuessige Energie als roetliches Fluoreszenzlicht ab. In vivo wird diese Energie stattdessen photochemisch genutzt." }
    ]
  },
  {
    id: "lichtreaktion",
    title: "Primaerreaktion (Lichtreaktion)",
    emoji: "\u26A1",
    color: "yellow",
    questions: [
      { type:"mc", level:"gk", q:"Wo genau findet die Primaerreaktion statt?", opts:["Im Stroma","In der Thylakoidmembran","Im Zytoplasma","In der aeusseren Membran"], correct:1, explain:"In der Thylakoidmembran sitzen die Fotosysteme und Proteinekomplexe wie auf einer Perlenkette aufgereiht." },
      { type:"mc", level:"lk", q:"Was ist der 'Lichtsammelkomplex' (Antennenkomplex)?", opts:["Ein einzelnes Chlorophyll-Molekuel","Hunderte Pigmente, die Energie zum Reaktionszentrum leiten","Ein Enzym im Stroma","Der Raum im Thylakoidlumen"], correct:1, explain:"Wie ein Trichter: Antennenpigmente fangen Licht ein und geben die ENERGIE (nicht Elektronen!) wie bei einer La-Ola-Welle zum Reaktionszentrum weiter." },
      { type:"mc", level:"lk", q:"Bei welcher Wellenlaenge absorbiert das Reaktionszentrum von Fotosystem II am besten?", opts:["430 nm","550 nm","680 nm (P680)","700 nm (P700)"], correct:2, explain:"Fotosystem II = P680 (absorbiert bei 680 nm). Fotosystem I = P700 (absorbiert bei 700 nm). PS II steht am Anfang der Kette!" },
      { type:"order", level:"abi", q:"Ordne die Schritte der Lichtreaktion in der richtigen Reihenfolge:", items:["Licht trifft auf Fotosystem II (P680)","Elektron wird aus P680 herausgeschleudert","Fotolyse des Wassers fuellt die Elektronenluecke","Elektron wandert ueber Transportkette (bergab)","Protonen werden ins Thylakoidlumen gepumpt","Licht trifft auf Fotosystem I (P700)","Elektron von PS II fuellt Luecke in PS I","Angeregtes Elektron von PS I bildet NADPH+H+"], explain:"Das ist das Z-Schema: Linearer Elektronenfluss von Wasser ueber PS II und PS I bis zum NADPH." },
      { type:"fill", level:"gk", q:"Bei der Fotolyse wird Wasser gespalten: H2O -> 2H+ + 2e- + 1/2 _____", answer:["O2","o2","O\u2082"], explain:"Der Sauerstoff ist nur ein 'Abfallprodukt' der Fotolyse! Die Elektronen fuellen die Luecke im P680, die Protonen bleiben im Thylakoidlumen." },
      { type:"tf", level:"gk", q:"Der Sauerstoff, den wir atmen, stammt aus dem CO2.", correct:false, explain:"Der O2 stammt aus der Spaltung von WASSER (Fotolyse)! CO2 liefert den Kohlenstoff fuer den Zucker im Calvin-Zyklus." },
      { type:"mc", level:"lk", q:"Wie entsteht ATP in der Lichtreaktion (Chemiosmose)?", opts:["Direkt durch Lichtenergie","Protonen stroemen durch ATP-Synthase zurueck ins Stroma","Durch Spaltung von Glucose","Durch Enzyme im Stroma"], correct:1, explain:"Wie ein Staudamm: Protonen (H+) stauen sich im Thylakoidlumen. Sie stroemen durch die ATP-Synthase (Turbine) ins Stroma — dabei wird ATP aus ADP+P hergestellt." },
      { type:"mc", level:"gk", q:"Was sind die PRODUKTE der Primaerreaktion?", opts:["Glucose und Wasser","O2, NADPH+H+ und ATP","CO2 und Wasser","Nur ATP"], correct:1, explain:"O2 entweicht, NADPH+H+ (energiereiches Reduktionsmittel) und ATP (Energietraeger) gehen beide in den Calvin-Zyklus." },
      { type:"tf", level:"lk", q:"Die Lichtreaktion heisst 'nicht-zyklische Phosphorylierung', weil die Elektronen einen linearen Weg nehmen und NICHT zum Ursprung zurueckkehren.", correct:true, explain:"Korrekt! Elektronen fliessen linear: Wasser -> PS II -> Transportkette -> PS I -> NADPH. Sie kehren nicht zurueck." },
      { type:"match", level:"lk", q:"Ordne die Begriffe der Lichtreaktion zu:", pairs:[["P680","Reaktionszentrum von Fotosystem II"],["P700","Reaktionszentrum von Fotosystem I"],["Fotolyse","Spaltung von Wasser"],["ATP-Synthase","Protonen-Turbine fuer ATP"],["NADPH+H+","Energiereiches Reduktionsmittel"]], explain:"Diese Begriffe sind das Grundvokabular der Lichtreaktion." },
      // ===== NEW Primaerreaktion questions =====
      { type:"mc", level:"gk", q:"Was ist das Ausgangsmaterial der Fotolyse?", opts:["CO2","Glucose","Wasser","Sauerstoff"], correct:2, explain:"Bei der Fotolyse wird Wasser (H2O) durch Lichtenergie gespalten: 2H2O -> 4H+ + 4e- + O2. Das Wasser liefert die Elektronen fuer den Elektronentransport." },
      { type:"tf", level:"gk", q:"Bei der Lichtreaktion wird CO2 verbraucht.", correct:false, explain:"Nein! CO2 wird erst im Calvin-Zyklus (Sekundaerreaktion/Dunkelreaktion) verbraucht. Die Lichtreaktion verwendet Wasser und Licht und produziert O2, ATP und NADPH+H+." },
      { type:"mc", level:"lk", q:"Welches Protein transportiert Elektronen zwischen PS II und PS I?", opts:["Rubisco","Plastochinon und Cytochrom-b6f-Komplex","ATP-Synthase","Ferredoxin"], correct:1, explain:"Die Elektronentransportkette zwischen PS II und PS I besteht aus: Plastochinon -> Cytochrom-b6f-Komplex -> Plastocyanin. Der Cytochrom-b6f-Komplex pumpt dabei gleichzeitig Protonen ins Thylakoidlumen." },
      { type:"fill", level:"lk", q:"Der Protonenkonzentrationsunterschied zwischen Thylakoidlumen und Stroma treibt die _____ an.", answer:["ATP-Synthase","ATPSynthase","ATP-synthase","Atp-Synthase"], explain:"Der Protonengradient (chemiosmotisches Potenzial) zwischen dem sauren Thylakoidlumen und dem basischen Stroma treibt die ATP-Synthase an — Protonen fliessen durch sie hindurch und die dabei freigesetzte Energie wird zur ATP-Bildung genutzt." },
      { type:"mc", level:"abi", q:"DCMU blockiert den Elektronentransport zwischen PS II und Plastochinon. Welche Auswirkungen hat dies?", opts:["Nur die ATP-Produktion stoppt","Es entsteht mehr O2","Kein NADPH, kein O2; ATP-Produktion ueber zyklische Photophosphorylierung moeglich","Keine Auswirkung, PS I arbeitet weiter normal"], correct:2, hint:"Ueberlege, was passiert, wenn die Elektronenquelle fuer PS I versiegt, und ob es alternative Wege gibt.", explain:"Wenn DCMU den Elektronenfluss von PS II blockiert: (1) Keine Fotolyse mehr noetig -> kein O2, (2) PS I bekommt keine Elektronen von PS II -> kein NADPH. Aber: PS I kann im zyklischen Elektronentransport weiterarbeiten und ueber den Protonengradient ATP produzieren." },
      { type:"mc", level:"abi", q:"Erklaere, warum isolierte Thylakoide im Licht ATP produzieren koennen, wenn man kuenstlich einen pH-Gradienten erzeugt.", opts:["Licht aktiviert die ATP-Synthase direkt","Chemiosmose funktioniert auch ohne Elektronentransport, wenn der Protonengradient vorhanden ist","Die Thylakoide enthalten gespeichertes ATP","Protonen werden durch Osmose erzeugt"], correct:1, hint:"Denke an das Jagendorf-Experiment und das Prinzip der Chemiosmose.", explain:"Das zeigt das Jagendorf-Experiment: Die ATP-Synthase braucht nur einen Protonengradienten, egal wie dieser entstanden ist. Wenn man Thylakoide in Saeure badet (pH 4) und dann in basische Loesung (pH 8) bringt, entsteht ein kuenstlicher Gradient — die ATP-Synthase produziert ATP auch ohne Licht und Elektronentransport. Das beweist die Chemiosmose-Theorie von Mitchell." },
      { type:"mc", level:"gk", q:"Was sind die beiden Fotosysteme?", opts:["PS A und PS B","PS I und PS II","PS alpha und PS beta","PS 680 und PS 430"], correct:1, explain:"Die beiden Fotosysteme heissen Fotosystem I (PS I, mit P700) und Fotosystem II (PS II, mit P680). Obwohl PS II die Nummer 2 traegt, steht es am ANFANG der Elektronentransportkette." },
      { type:"order", level:"lk", q:"Ordne den Elektronentransport der Lichtreaktion:", items:["Wasser (H2O) wird gespalten","Elektronen gelangen zu Fotosystem II (P680)","Plastochinon transportiert Elektronen","Cytochrom-b6f-Komplex pumpt H+ ins Lumen","Plastocyanin uebertraegt Elektronen zu PS I","Fotosystem I (P700) hebt Elektronen auf hohes Niveau","Ferredoxin leitet Elektronen weiter","NADP-Reduktase bildet NADPH+H+"], explain:"Das ist der vollstaendige lineare (nicht-zyklische) Elektronentransport der Lichtreaktion — von Wasser bis NADPH." }
    ]
  },
  {
    id: "calvin",
    title: "Calvin-Zyklus (Sekundaerreaktion)",
    emoji: "\uD83D\uDD04",
    color: "purple",
    questions: [
      { type:"mc", level:"gk", q:"Wo findet der Calvin-Zyklus statt?", opts:["In der Thylakoidmembran","Im Stroma des Chloroplasten","Im Zytoplasma","In den Mitochondrien"], correct:1, explain:"Im Stroma — die fluessige Grundsubstanz des Chloroplasten. Hier sind die Enzyme (v.a. Rubisco) fuer die CO2-Fixierung." },
      { type:"tf", level:"lk", q:"Der Calvin-Zyklus kann OHNE Licht unbegrenzt weiterlaufen.", correct:false, explain:"Er heisst zwar 'lichtunabhaengig', braucht aber ATP und NADPH+H+ aus der Lichtreaktion. Ohne Licht gehen diese Vorraete schnell aus." },
      { type:"fill", level:"gk", q:"Das Enzym _____ ist das haeufigste Protein der Erde und fixiert CO2 im Calvin-Zyklus.", answer:["Rubisco","rubisco","RuBisCO"], explain:"Rubisco (Ribulose-1,5-bisphosphat-Carboxylase/Oxygenase) arbeitet relativ langsam, daher braucht jede Pflanze riesige Mengen davon." },
      { type:"mc", level:"lk", q:"Was passiert in Phase 1 (Kohlenstofffixierung)?", opts:["Glucose wird gespalten","CO2 wird an RubP (C5) gebunden -> 2x PGS (C3)","Wasser wird gespalten","ATP wird zu ADP"], correct:1, explain:"C5 (RubP) + C1 (CO2) -> instabiler C6-Koerper -> 2x C3 (PGS/3-Phosphoglycerinsaeure). Damit ist der Kohlenstoff 'fixiert'." },
      { type:"mc", level:"abi", q:"Was ist der Unterschied zwischen PGS und PGA?", opts:["PGS hat mehr Kohlenstoff","PGA ist energiereicher als PGS","PGS ist ein Zucker, PGA eine Saeure","Es gibt keinen Unterschied"], correct:1, explain:"PGS = 3-Phosphoglycerinsaeure (energieniedrig). PGA = 3-Phosphoglycerinaldehyd (energiereich, das erste Kohlenhydrat/Triose)." },
      { type:"mc", level:"lk", q:"Welche Rolle spielt ATP bei der Umwandlung von PGS zu PGA?", opts:["Es spaltet CO2 ab","Es phosphoryliert PGS (macht es reaktionsbereit)","Es liefert Sauerstoff","Es transportiert Zucker"], correct:1, explain:"ATP liefert Energie: PGS wird phosphoryliert (aktiviert). Dann uebertraegt NADPH+H+ Elektronen und Wasserstoff — die Saeure wird zum Zucker-Vorlaufer reduziert." },
      { type:"fill", level:"abi", q:"Vom gebildeten PGA verlassen nur 1/_____ den Zyklus fuer Glucose-Aufbau. Der Rest wird fuer die Regeneration genutzt.", answer:["6"], explain:"Nur 1/6 des PGA wird zu Glucose aufgebaut. 5/6 bleiben im Zyklus, um den Akzeptor RubP zu regenerieren." },
      { type:"order", level:"gk", q:"Ordne die 3 Phasen des Calvin-Zyklus:", items:["Phase 1: Kohlenstofffixierung (CO2 an RubP)","Phase 2: Reduktion (PGS zu PGA mit ATP + NADPH)","Phase 3: Regeneration (RubP wird wiederhergestellt)"], explain:"Fixierung -> Reduktion -> Regeneration -> und wieder von vorn. Ein Kreisprozess!" },
      { type:"mc", level:"lk", q:"Wie oft muss der Calvin-Zyklus fuer 1 Glucose-Molekuel (C6H12O6) durchlaufen werden?", opts:["1 Mal","3 Mal","6 Mal","12 Mal"], correct:2, explain:"Glucose hat 6 C-Atome, CO2 liefert pro Durchlauf nur 1 C-Atom. Also: 6 Durchlaeufe noetig. Verbrauch: 18 ATP + 12 NADPH+H+." },
      { type:"mc", level:"lk", q:"Was ist die 'Akku-Analogie' fuer Licht- und Dunkelreaktion?", opts:["Lichtreaktion laedt Akkus auf (ADP->ATP), Dunkelreaktion entlaedt sie","Dunkelreaktion laedt Akkus auf, Lichtreaktion entlaedt sie","Beide laden gleichzeitig auf","Die Akkus sind die Chloroplasten selbst"], correct:0, explain:"Lichtreaktion = Akku laden (ADP->ATP, NADP+->NADPH). Dunkelreaktion = Akku entladen (Zucker bauen). Leere Akkus gehen zurueck zur Lichtreaktion." },
      // ===== NEW Calvin-Zyklus questions =====
      { type:"mc", level:"gk", q:"Welches Gas wird im Calvin-Zyklus fixiert?", opts:["O2","N2","CO2","H2"], correct:2, explain:"Im Calvin-Zyklus wird CO2 (Kohlenstoffdioxid) an den Akzeptor RubP gebunden — das nennt man Kohlenstofffixierung." },
      { type:"tf", level:"gk", q:"Der Calvin-Zyklus findet in der Thylakoidmembran statt.", correct:false, explain:"Falsch! Der Calvin-Zyklus findet im STROMA statt — der fluessigen Grundsubstanz des Chloroplasten. Die Thylakoidmembran ist der Ort der Lichtreaktion." },
      { type:"mc", level:"lk", q:"Wie heisst der C3-Koerper, der bei der CO2-Fixierung entsteht?", opts:["Glucose","3-Phosphoglycerinsaeure (PGS/3-PGA)","Pyruvat","Acetyl-CoA"], correct:1, explain:"Bei der CO2-Fixierung entsteht 3-Phosphoglycerinsaeure (3-PGA/PGS), ein C3-Koerper. Rubisco katalysiert die Reaktion: RubP (C5) + CO2 (C1) -> 2x 3-PGA (C3)." },
      { type:"fill", level:"lk", q:"Fuer ein Glucose-Molekuel werden ___ ATP und 12 NADPH+H+ verbraucht.", answer:["18"], explain:"Pro Glucose: 6 Zyklusdurchlaeufe x 3 ATP = 18 ATP, plus 6 x 2 NADPH = 12 NADPH+H+. Der groesste Teil des ATP wird fuer die Regeneration des Akzeptors RubP benoetigt." },
      { type:"mc", level:"abi", q:"Bei erhoehter O2-Konzentration sinkt die Fotosyntheserate. Welches Phaenomen wird beschrieben?", opts:["Dunkelatmung","Fotorespiration (Rubisco fixiert O2 statt CO2)","Gaerung","Chemiosmose"], correct:1, hint:"Denke daran, dass Rubisco nicht nur CO2, sondern auch ein anderes Gas binden kann.", explain:"Fotorespiration: Rubisco kann auch O2 binden (Oxygenase-Aktivitaet) statt CO2 (Carboxylase-Aktivitaet). Bei hoher O2-Konzentration ueberwiegt die Oxygenase-Reaktion — es entsteht Phosphoglycolat, das unter Energieverlust abgebaut wird. C4- und CAM-Pflanzen haben Strategien dagegen entwickelt." },
      { type:"mc", level:"abi", q:"Warum ist Rubisco trotz seiner Ineffizienz evolutionaer erhalten geblieben?", opts:["Es gibt kein besseres Enzym in der Natur","Es entwickelte sich in O2-freier Atmosphaere und keine bessere Alternative ist evolviert","Es arbeitet eigentlich sehr effizient","Pflanzen brauchen die Fotorespiration"], correct:1, hint:"Denke an die Erdgeschichte: Wie war die Atmosphaere, als Rubisco entstand?", explain:"Rubisco entstand vor ca. 3.5 Milliarden Jahren, als die Atmosphaere kaum O2 enthielt. Damals war die O2-Bindung kein Problem. Evolution kann nicht 'von vorne anfangen' — sie verbessert nur bestehende Systeme. Trotz vieler Versuche ist kein Organismus bekannt, der ein grundsaetzlich besseres CO2-fixierendes Enzym entwickelt hat." },
      { type:"mc", level:"gk", q:"Was wird aus dem Calvin-Zyklus exportiert?", opts:["CO2","O2","G3P (Triosephosphat), daraus wird Glucose","Wasser"], correct:2, explain:"Das Produkt des Calvin-Zyklus ist G3P (Glycerinaldehyd-3-phosphat / Triosephosphat). Zwei G3P-Molekuele werden zu einem Glucose-Molekuel zusammengebaut." },
      { type:"mc", level:"lk", q:"In welcher Phase des Calvin-Zyklus werden ATP und NADPH verbraucht?", opts:["Kohlenstofffixierung","Reduktionsphase","Regenerationsphase","In allen Phasen gleich"], correct:1, explain:"In der Reduktionsphase (Phase 2) wird PGS zu PGA (G3P) reduziert. Dabei wird ATP fuer die Phosphorylierung und NADPH+H+ fuer die Reduktion verbraucht. ATP wird auch in der Regenerationsphase benoetigt." }
    ]
  },
  {
    id: "zellatmung",
    title: "Zellatmung",
    emoji: "\uD83D\uDD0B",
    color: "orange",
    questions: [
      { type:"mc", level:"lk", q:"Wie ist ein Mitochondrium grundsaetzlich aufgebaut?", opts:["Einfache Membran mit Thylakoiden","Doppelmembran mit Cristae (Einstuelpungen der inneren Membran)","Drei Membranen mit Grana","Keine Membran, nur Matrix"], correct:1, explain:"Doppelmembran (wie Chloroplast -> Endosymbiontentheorie). Cristae = gefaltete innere Membran fuer Oberflaechenvergroesserung. Matrix = fluessiger Innenraum." },
      { type:"match", level:"lk", q:"Ordne die Orte der Zellatmung den Schritten zu:", pairs:[["Zytoplasma","Glykolyse"],["Mitochondrien-Matrix","Oxidative Decarboxylierung + Citratzyklus"],["Innere Mitochondrienmembran","Endoxidation (Atmungskette)"],["Intermembranraum","Protonenreservoir fuer ATP-Synthase"]], explain:"Jeder Schritt der Zellatmung findet an einem anderen Ort statt!" },
      { type:"mc", level:"gk", q:"Was passiert bei der Glykolyse?", opts:["O2 wird verbraucht","Glucose (C6) wird in 2 Pyruvat (C3) gespalten","CO2 wird fixiert","Wasser wird gespalten"], correct:1, explain:"Glykolyse = 'Zucker-Zerlegung' im Zytoplasma. 1 Glucose -> 2 Pyruvat + 2 ATP + 2 NADH+H+. Kein O2 noetig (anaerob)!" },
      { type:"tf", level:"gk", q:"Die Glykolyse benoetigt Sauerstoff.", correct:false, explain:"Nein! Die Glykolyse ist ANAEROB — sie laeuft ohne Sauerstoff ab. Sie ist der aelteste Weg der Energiegewinnung (schon vor der Sauerstoff-Atmosphaere)." },
      { type:"fill", level:"lk", q:"Bei der oxidativen Decarboxylierung entsteht aus Pyruvat (C3) der Stoff _____ (C2-Koerper + Coenzym A).", answer:["Acetyl-CoA","acetyl-coa","Acetyl-coa","acetyl-CoA","AcetylCoA"], explain:"Pyruvat -> CO2 wird abgespalten + Rest (C2) bindet an Coenzym A = Acetyl-CoA. Gleichzeitig entsteht NADH+H+." },
      { type:"mc", level:"lk", q:"Was ist der eigentliche Hauptzweck des Citratzyklus?", opts:["Direkte ATP-Gewinnung in grossen Mengen","Elektronen und Protonen fuer die Endoxidation 'ernten' (NADH+H+, FADH2)","CO2 fixieren","Glucose aufbauen"], correct:1, explain:"Der Citratzyklus ist ein 'Elektronenernter': Er belaedt NAD+ und FAD mit Elektronen (6 NADH+H+ und 2 FADH2 pro Glucose). Die direkte ATP-Ausbeute ist gering." },
      { type:"mc", level:"lk", q:"Warum heisst der Citratzyklus 'Zyklus'?", opts:["Weil er nur einmal ablaeuft","Weil Acetyl-CoA (C2) an Oxalessigsaeure (C4) bindet -> Citrat (C6) -> Abbau -> am Ende wieder C4-Akzeptor","Weil er zwischen Tag und Nacht wechselt","Weil die Enzyme rotieren"], correct:1, explain:"Kreisprozess: C2 + C4 -> C6 (Citrat) -> schrittweiser Abbau zurueck zu C4. Der Kreis schliesst sich, damit er immer weiterlaeuft." },
      { type:"fill", level:"gk", q:"Bei der Endoxidation ist _____ der finale Elektronenakzeptor.", answer:["Sauerstoff","O2","sauerstoff","o2"], explain:"Deshalb muessen wir ATMEN: O2 nimmt am Ende der Kette die Elektronen auf. 4H+ + 4e- + O2 -> 2H2O. Ohne O2 verstopft die Kette!" },
      { type:"mc", level:"lk", q:"Wie viel ATP entsteht bei der Endoxidation ungefaehr (pro Glucose)?", opts:["2 ATP","4 ATP","10 ATP","Ca. 28-34 ATP"], correct:3, explain:"Die Endoxidation liefert den Loewenanteil: ca. 28-34 ATP (je nach Quelle 30-32). Die Glykolyse liefert nur 2 ATP direkt." },
      { type:"mc", level:"abi", q:"Wie funktioniert die Chemiosmose im Mitochondrium?", opts:["Protonen werden aus der Matrix in den Intermembranraum gepumpt und fliessen durch ATP-Synthase zurueck","ATP wird direkt durch Enzyme gespalten","Glucose wird direkt zu ATP","Sauerstoff treibt die ATP-Synthase an"], correct:0, explain:"Fast identisch zur Lichtreaktion! Elektronenfluss pumpt H+ in den Intermembranraum. H+ fliessen durch ATP-Synthase zurueck = ATP-Bildung." },
      { type:"order", level:"gk", q:"Ordne die 4 Schritte der Zellatmung:", items:["Glykolyse (Zytoplasma)","Oxidative Decarboxylierung (Matrix)","Citratzyklus (Matrix)","Endoxidation / Atmungskette (innere Membran)"], explain:"Glucose wird schrittweise zerlegt: erst im Zytoplasma (Glykolyse), dann in den Mitochondrien (Schritte 2-4)." },
      { type:"tf", level:"lk", q:"Die Summengleichung der Zellatmung ist genau umgekehrt zur Fotosynthese.", correct:true, explain:"Fotosynthese: CO2 + H2O + Licht -> Glucose + O2 (aufbauend). Zellatmung: Glucose + O2 -> CO2 + H2O + ATP (abbauend). Stofflich gegenlaeutig!" },
      { type:"mc", level:"lk", q:"Wo entsteht das CO2, das wir ausatmen?", opts:["Bei der Glykolyse","Bei der oxidativen Decarboxylierung und im Citratzyklus","Bei der Endoxidation","In den Lungen"], correct:1, explain:"CO2 entsteht bei der ox. Decarboxylierung (2 CO2) und im Citratzyklus (4 CO2) = 6 CO2 pro Glucose insgesamt." },
      // ===== NEW Zellatmung questions =====
      { type:"mc", level:"gk", q:"Wo findet die Glykolyse statt?", opts:["In den Mitochondrien","Im Zellkern","Im Zytoplasma","Im Chloroplast"], correct:2, explain:"Die Glykolyse findet im Zytoplasma (Cytosol) statt — sie ist der einzige Schritt der Zellatmung, der NICHT in den Mitochondrien ablaeuft." },
      { type:"tf", level:"gk", q:"Zellatmung findet nur bei Tieren statt.", correct:false, explain:"Falsch! ALLE lebenden Zellen betreiben Zellatmung — auch Pflanzenzellen! Pflanzen brauchen Zellatmung, um die in der Fotosynthese gespeicherte Energie fuer Lebensprozesse freizusetzen, besonders nachts." },
      { type:"mc", level:"lk", q:"Wie viele NADH+H+ entstehen im Citratzyklus pro Acetyl-CoA?", opts:["1 NADH+H+","2 NADH+H+","3 NADH+H+","4 NADH+H+"], correct:2, explain:"Pro Acetyl-CoA entstehen im Citratzyklus: 3 NADH+H+ + 1 FADH2 + 1 GTP (= 1 ATP). Da pro Glucose 2 Acetyl-CoA entstehen, sind es insgesamt 6 NADH+H+ + 2 FADH2 + 2 GTP." },
      { type:"fill", level:"lk", q:"Die Gesamtgleichung der Zellatmung lautet: C6H12O6 + 6O2 -> 6___ + 6H2O + Energie", answer:["CO2","co2","CO\u2082"], explain:"Die Summengleichung der Zellatmung: C6H12O6 + 6O2 -> 6CO2 + 6H2O + Energie (als ATP). Sie ist die Umkehrung der Fotosynthese-Gleichung." },
      { type:"mc", level:"abi", q:"Cyanid blockiert Komplex IV der Atmungskette. Warum ist dies toedlich?", opts:["Es zerstoert die Mitochondrien","Elektronenfluss stoppt -> kein Protonengradient -> kein ATP -> Zelltod","Es verhindert die Glykolyse","Es blockiert den Citratzyklus direkt"], correct:1, hint:"Ueberlege, was passiert, wenn die Elektronen am Ende der Kette nicht mehr abgenommen werden.", explain:"Cyanid blockiert Komplex IV (Cytochrom-c-Oxidase): Elektronen koennen nicht mehr auf O2 uebertragen werden. Die gesamte Kette staut sich zurueck, der Protonengradient bricht zusammen, die ATP-Synthase stoppt. Da ~90% des zellularen ATP ueber die Atmungskette produziert wird, fuehrt der ATP-Mangel zum raschen Zelltod." },
      { type:"mc", level:"abi", q:"Warum koennen Hefezellen ohne Sauerstoff ueberleben, aber weniger ATP produzieren?", opts:["Sie nutzen einen anderen Elektronenakzeptor","Alkoholische Gaerung statt aerobe Atmung: nur 2 ATP statt 30-32 ATP pro Glucose","Sie verbrauchen gespeichertes ATP","Sie betreiben Fotosynthese"], correct:1, hint:"Denke an die alkoholische Gaerung und vergleiche die ATP-Bilanz.", explain:"Ohne O2 koennen Hefezellen alkoholische Gaerung betreiben: Glucose -> 2 Ethanol + 2 CO2 + 2 ATP. Im Vergleich zur aeroben Atmung (30-32 ATP) ist das sehr wenig. Die Gaerung regeneriert NAD+ fuer die Glykolyse, aber die energiereichen Elektronen in Ethanol gehen verloren." },
      { type:"mc", level:"gk", q:"Welches Molekuel ist der universelle Energietraeger der Zelle?", opts:["Glucose","NADH","ATP","DNA"], correct:2, explain:"ATP (Adenosintriphosphat) ist der universelle Energietraeger aller Zellen. Es wird bei der Zellatmung produziert und bei energieverbrauchenden Prozessen (Bewegung, Transport, Biosynthese) wieder zu ADP + Pi gespalten." },
      { type:"mc", level:"lk", q:"Was ist der Unterschied zwischen Substratkettenphosphorylierung und oxidativer Phosphorylierung?", opts:["Es gibt keinen Unterschied","Direkte ATP-Bildung durch Enzymreaktion vs. indirekte ATP-Bildung ueber Protonengradient","Substratkettenphosphorylierung braucht O2","Oxidative Phosphorylierung findet im Zytoplasma statt"], correct:1, explain:"Substratkettenphosphorylierung: ATP wird direkt durch ein Enzym gebildet (z.B. in der Glykolyse und im Citratzyklus). Oxidative Phosphorylierung: ATP wird indirekt ueber einen Protonengradienten und die ATP-Synthase gebildet (Atmungskette). Letztere liefert deutlich mehr ATP." }
    ]
  },
  {
    id: "vergleich",
    title: "Vergleich & Synthese",
    emoji: "\uD83E\uDDE0",
    color: "blue",
    questions: [
      { type:"match", level:"lk", q:"Fotosynthese vs. Zellatmung — Ordne zu:", pairs:[["Fotosynthese","Baut Glucose AUF (Assimilation)"],["Zellatmung","Baut Glucose AB (Dissimilation)"],["Chloroplast","Ort der Fotosynthese"],["Mitochondrium","Ort der Zellatmung"],["Lichtenergie","Antrieb der Fotosynthese"],["ATP","Energieprodukt der Zellatmung"]], explain:"Diese Gegensaetze sind ein Klassiker in Pruefungen!" },
      { type:"mc", level:"lk", q:"Was haben Chloroplast und Mitochondrium gemeinsam?", opts:["Beide haben Thylakoide","Beide haben eine Doppelmembran und eigene DNA (Endosymbiontentheorie)","Beide produzieren O2","Beide befinden sich im Zellkern"], correct:1, explain:"Doppelmembran + eigene DNA + eigene Ribosomen = starker Hinweis auf Endosymbiontentheorie (frueher eigenstaendige Bakterien)." },
      { type:"mc", level:"gk", q:"Was ist die vollstaendige Summengleichung der Fotosynthese?", opts:["CO2 + H2O -> O2","6CO2 + 6H2O + Licht -> C6H12O6 + 6O2","C6H12O6 + 6O2 -> 6CO2 + 6H2O","6O2 -> 6CO2"], correct:1, explain:"6 CO2 + 6 H2O + Lichtenergie -> Glucose (C6H12O6) + 6 O2. Das Wasser wird gespalten, der Sauerstoff kommt aus dem Wasser!" },
      { type:"mc", level:"gk", q:"Wie viel ATP wird INSGESAMT pro Glucose bei der Zellatmung gewonnen?", opts:["2 ATP","4 ATP","Ca. 30-32 ATP","100 ATP"], correct:2, explain:"Glykolyse: 2 ATP + Ox. Decarboxylierung: 0 direkt + Citratzyklus: 2 ATP + Endoxidation: ~28-34 ATP = ca. 30-38 ATP insgesamt." },
      { type:"tf", level:"lk", q:"Die ATP-Synthase funktioniert im Chloroplast und im Mitochondrium nach dem gleichen Prinzip (Chemiosmose).", correct:true, explain:"Ja! Beide nutzen einen Protonengradienten als 'Batterie'. Protonen stroemen durch die ATP-Synthase und treiben dabei ATP-Bildung an. Gleiches Prinzip, verschiedene Orte." },
      { type:"mc", level:"lk", q:"Welche Analogie beschreibt die Beziehung zwischen Licht- und Dunkelreaktion am besten?", opts:["Koch und Kellner","Akku laden (Lichtreaktion) und Akku entladen (Dunkelreaktion)","Motor und Bremse","Sender und Empfaenger"], correct:1, explain:"Lichtreaktion = Akku laden (ADP->ATP, NADP+->NADPH). Dunkelreaktion = Akku entladen (ATP+NADPH -> Zucker bauen). Leere Akkus gehen zurueck!" },
